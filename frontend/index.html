<head>
<meta charset="utf-8" />
<!--
  process_board_v2 — 프로세스 설계 프론트엔드 (Streamlit 정적 커스텀 컴포넌트, npm 빌드 없음)

  ★ 기존 index.html 과의 핵심 차이:
    - 예전 보드는 "보이는 4컬럼"만 담고 이벤트 1건만 되돌렸다.
    - v2 는 전체 트리를 브라우저가 들고 편집하며, [저장] 시 tree 전체를 되돌린다.
      → 파이썬(app.py)이 store.save_tree 로 원자적 저장 + 스냅샷 + 충돌검사.
  ★ 모든 postMessage 에 isStreamlitMessage:true 필수. send() 한 곳에서만 postMessage.
  ★ 순서: componentReady → 부모 streamlit:render → setFrameHeight → (조작) setComponentValue.
  ★ render() 안에서는 setComponentValue 를 부르지 않는다(무한 리런). 사용자 조작에서만.
  ★ 파이썬이 넘겨주는 args: { tree:{nodes,domains,rev}, author, env, history:[], audit:[],
      flash:"", conflict:null|{...} }. 컴포넌트가 되돌리는 값: { type, evt_id, ... }.

  ★ 드래그(SortableJS, 로컬 번들 · MIT): 트리를 브라우저가 통째로 들고 있으므로 드래그는
    S.nodes 만 고치고 서버 왕복이 없다. group 을 레벨별(L3~L6)로 분리해 lv4 카드가 lv6
    컬럼에 떨어지는 사고를 구조적으로 막는다 — 같은 레벨끼리만 오가므로 레벨 변경·사이클이
    원천적으로 불가능하다. forceFallback: iframe 안에서 pointer 이벤트가 더 일관되고
    드래그 중 자동 스크롤을 얻는다(네이티브 dragenter 가 없어 강조는 :hover CSS 로 처리).
-->

<div id="app"></div>
<script>
(function () {
  "use strict";

  // ── Streamlit 프로토콜 ───────────────────────────────
  var IN_ST = false;
  function send(msg) { try { window.parent.postMessage(Object.assign({ isStreamlitMessage: true }, msg), "*"); } catch (e) {} }
  function setHeight(h) { send({ type: "streamlit:setFrameHeight", height: h }); }
  function uid() { try { if (crypto && crypto.randomUUID) return crypto.randomUUID(); } catch (e) {} return "e" + Date.now() + "-" + Math.floor(Math.random() * 1e9); }
  function emit(evt) { evt.evt_id = uid(); if (IN_ST) send({ type: "streamlit:setComponentValue", value: evt, dataType: "json" }); else localAction(evt); }

  // ── 데이터 모델 (schema.py 와 동일 구조: 평면 노드 + parent_id) ──
  var ROOT = "__root__";
  var LABELS = { 3: "부문", 4: "대분류", 5: "중분류", 6: "세부업무" };
  var FIXED = ["조선", "생산", "시운전"];

      html += '<div class="col' + (enabled ? "" : " off") + '"><div class="colhead"><span class="t">lv' + lv + " " + esc(LABELS[lv]) + '</span><span class="n">' + (enabled ? childrenOf(pid).length : 0) + "</span></div>"
        + '<div class="list scroll" data-lv="' + lv + '" data-parent="' + esc(pid || "") + '">';
      if (!enabled) html += '<div class="emptyhint">상위 항목을<br/>먼저 선택하세요</div>';
      else {
        var cards = childrenOf(pid);
        cards.forEach(function (nn) { html += cardHTML(nn, lv); });
        html += '<button class="addbtn" data-act="add" data-pid="' + esc(pid) + '" data-lv="' + lv + '">＋ 새 ' + esc(LABELS[lv]) + "</button>";
      }
      html += "</div></div>";
    }
    return html + "</div>";
  }
  function cardHTML(nn, lv) {
    var detail = hasDetail(lv), chips = "";
    if (detail && nn.has_ai_agent) chips += '<span class="mc ai">AI</span>';
    if (detail) (nn.tech || []).slice(0, 2).forEach(function (t) { chips += '<span class="mc n">' + esc(t) + "</span>"; });
    if (detail && (nn.tech || []).length > 2) chips += '<span class="mc n">+' + ((nn.tech.length) - 2) + "</span>";
    if (detail && nn.dept) chips += '<span class="mc dept">' + esc(nn.dept) + "</span>";
    if (detail && nn.owner) chips += '<span class="mc n">' + esc(maskName(nn.owner)) + "</span>";
    var kids = childrenOf(nn.id).length;
    if (kids) chips += '<span class="mc kids">▸' + kids + "</span>";
    var sel = S.selectedId === nn.id;
    // lv6 아래는 없으므로 드롭존도 없다. 드롭존은 자기보다 한 단계 아래 레벨만 받는다.
    var drop = lv < 6 ? '<div class="cdrop acc' + (lv + 1) + '" data-parent="' + esc(nn.id) + '"></div>' : "";
    return '<div class="card' + (sel ? " sel" : "") + '" data-act="select" data-id="' + esc(nn.id) + '" data-lv="' + lv + '">'
      + '<div class="top1"><div class="nm">' + esc(nn.name || "(이름 없음)") + "</div>" + (S.dirty.indexOf(nn.id) >= 0 ? '<span class="dot" title="저장 안 됨"></span>' : "") + "</div>"
      + (nn.desc ? '<div class="cdesc">' + esc(nn.desc) + "</div>" : "")
      + (chips ? '<div class="meta">' + chips + "</div>" : "")
      + drop
      + "</div>";
  }

  function outline() {
    var anyOpen = S.nodes.some(function (n) { return childrenOf(n.id).length && !S.collapsed[n.id]; });
    var body = "";
    (function walk(pid, depth) {
      childrenOf(pid).forEach(function (nn) {
        var kids = childrenOf(nn.id), col = !!S.collapsed[nn.id], sel = S.selectedId === nn.id, detail = hasDetail(nn.level);
        var chips = "";
        if (detail && nn.has_ai_agent) chips += '<span class="mc ai">AI</span>';
        if (detail && nn.dept) chips += '<span class="mc dept">' + esc(nn.dept) + "</span>";
        if (detail && nn.owner) chips += '<span class="mc n">' + esc(maskName(nn.owner)) + "</span>";
        if (kids.length) chips += '<span class="mc kids">▸' + kids.length + "</span>";
        body += '<div class="row' + (sel ? " sel" : "") + '" style="padding-left:' + (depth * 20) + 'px">'
          + '<div class="tog"' + (kids.length ? ' data-act="toggle" data-id="' + esc(nn.id) + '" style="cursor:pointer"' : "") + ">" + (kids.length ? (col ? "▸" : "▾") : "") + "</div>"
          + '<div class="rowmain" data-act="select" data-id="' + esc(nn.id) + '"><span class="lvb ' + (detail ? "d" : "g") + '">lv' + nn.level + "</span>"
          + '<span class="rowname"' + (sel ? ' style="font-weight:800"' : "") + ">" + esc(nn.name || "(이름 없음)") + "</span>"
          + (nn.desc ? '<span class="rowdesc">' + esc(nn.desc) + "</span>" : "") + chips
          + (S.dirty.indexOf(nn.id) >= 0 ? '<span class="dot"></span>' : "") + "</div>"
          + (nn.level < 6 ? '<button class="rowadd" data-act="add" data-pid="' + esc(nn.id) + '" data-lv="' + (nn.level + 1) + '" title="하위 추가">＋</button>' : "")
          + "</div>";
        if (!col) walk(nn.id, depth + 1);
      });
    })(ROOT, 0);
    return '<div class="outwrap"><div class="outcard"><div class="outhead"><span class="h1">업무 계층 전체보기</span><span class="h2">클릭하면 오른쪽에서 상세 입력</span><div class="grow"></div>'
      + '<button class="minibtn" data-act="collapse">' + (anyOpen ? "모두 접기" : "모두 펼치기") + "</button>"
      + '<button class="minibtn p" data-act="add" data-pid="' + ROOT + '" data-lv="3">＋ 새 부문</button></div>'
      + '<div class="list scroll" style="padding:7px">' + body + "</div></div></div>";
  }

  function crumbBar() {
    var chips = FIXED.map(function (f) { return '<span class="chip fix">🔒 ' + esc(f) + "</span><span class=\"sep\">›</span>"; }).join("");
    var tail = '<span class="crumbtail">· 카드를 선택하면 경로가 표시됩니다</span>';
    if (S.selectedId) { tail = ""; pathNames(S.selectedId).slice(3).forEach(function (nm) { chips += '<span class="chip cur">' + esc(nm || "(이름 없음)") + "</span><span class=\"sep\">›</span>"; }); }
    return '<div class="crumb">' + chips + tail + "</div>";
  }

  function panel() {
    if (!S.selectedId) {
      return '<div class="panel"><div class="pempty"><div style="font-size:34px">👈</div><div style="font-size:13px;font-weight:700;color:#57534e">카드를 선택하면 여기서 편집합니다</div><div style="font-size:11.5px;color:#a8a29e;line-height:1.6">각 컬럼의 <b>＋</b> 로 새 업무를 추가하고,<br/>내용은 입력 즉시 반영됩니다. 마치면 상단 <b>저장</b>.</div></div></div>';
    }
    var n = byId(S.selectedId); if (!n) return '<div class="panel"></div>';
    var detail = hasDetail(n.level), lv = n.level, id = n.id;
    var dirty = S.dirty.indexOf(id) >= 0;
    var head = '<div class="phead ' + (detail ? "d" : "g") + '"><div class="prow"><span class="ptag">지금 편집 중</span>'
      + '<span class="plv ' + (detail ? "d" : "g") + '">lv' + lv + " · " + esc(LABELS[lv]) + "</span>"
      + (dirty ? '<span class="punsaved">● 미저장</span>' : "") + "</div>"
      + '<div style="margin-top:8px;display:flex;align-items:flex-start;gap:10px"><div class="pname" style="flex:1;margin:0">' + esc(n.name || "(이름 없음)") + '</div><button class="delbtn" style="flex:none;font-size:11px;padding:6px 10px;white-space:nowrap" data-act="del" data-id="' + esc(id) + '">🗑 삭제 ' + (descCount(id) > 1 ? "(하위 " + (descCount(id) - 1) + "개 포함)" : "") + '</button></div>'
      + '<div class="ppath">' + esc(pathNames(id).join("  ›  ")) + "</div></div>";

    var fields = ""
      + '<div><div class="fl">' + esc(LABELS[lv]) + '명</div><input class="fi" data-fkey="name" data-id="' + esc(id) + '" value="' + esc(n.name) + '" placeholder="이름을 입력하세요" /></div>'
      + '<div><div class="fl">설명</div><textarea class="fa" data-fkey="desc" data-id="' + esc(id) + '" placeholder="이 업무가 무엇인지 간단히">' + esc(n.desc) + "</textarea></div>";

    if (!detail) {
      var hidden = ["dept", "owner", "outputs", "automation_level", "frequency"].some(function (k) { return n[k]; }) || n.has_ai_agent || (n.tech || []).length;
      fields += '<div class="note">📁 ' + esc(LABELS[lv]) + '은(는) 업무를 묶는 분류입니다.<br/>AI 에이전트·담당자 같은 세부 정보는 <b style="color:#0f766e">lv6 세부업무</b>에서 입력합니다.</div>';
      if (hidden) fields += '<div class="warn">💾 이전에 입력한 세부 정보가 보존되어 있습니다. lv6으로 옮기면 다시 나타납니다.</div>';
    } else {
      var opt = function (key, cur) { var base = (S.domains[key] || []).slice(); if (cur && base.indexOf(cur) < 0) base.push(cur); return '<option value="">— 선택 —</option>' + base.map(function (v) { return '<option value="' + esc(v) + '"' + (v === cur ? " selected" : "") + ">" + esc(v) + "</option>"; }).join(""); };
      var techChips = (S.domains.tech || []).map(function (t) { var on = (n.tech || []).indexOf(t) >= 0; return '<button class="tchip' + (on ? " on" : "") + '" data-act="tech" data-id="' + esc(id) + '" data-t="' + esc(t) + '">' + esc(t) + "</button>"; }).join("");
      fields += '<div class="aicard ' + (n.has_ai_agent ? "on" : "") + '"><label class="aiflex" style="gap:8px"><input type="checkbox" data-fkey="ai" data-id="' + esc(id) + '"' + (n.has_ai_agent ? " checked" : "") + ' style="width:15px;height:15px" /><span class="ait" style="color:' + (n.has_ai_agent ? "#166534" : "#334155") + '">🤖 AI 에이전트 적용</span><span class="aih" style="margin:0">' + (n.has_ai_agent ? "이 업무에 AI 에이전트가 적용됩니다" : "적용 시 요약 통계에 집계됩니다") + "</span></label></div>"
        + '<div class="grid2">'
        + '<div><div class="fl">부서/과</div><select class="fs" data-fkey="dept" data-id="' + esc(id) + '">' + opt("dept", n.dept) + "</select></div>"
        + '<div><div class="fl">담당자</div><input class="fi" style="font-size:12.5px;padding:8px 10px" data-fkey="owner" data-id="' + esc(id) + '" value="' + esc(n.owner) + '" placeholder="이름" /></div>'
        + '<div><div class="fl">자동화 수준</div><select class="fs" data-fkey="automation_level" data-id="' + esc(id) + '">' + opt("automation_level", n.automation_level) + "</select></div>"
        + '<div><div class="fl">수행 주기</div><select class="fs" data-fkey="frequency" data-id="' + esc(id) + '">' + opt("frequency", n.frequency) + "</select></div>"
        + "</div>"
        + '<div><div class="fl">활용 기술 <span style="color:#a8a29e;font-weight:600">· 눌러서 선택</span></div><div class="techrow">' + techChips + "</div></div>"
        + '<div><div class="fl">산출물 / 연계 시스템</div><input class="fi" style="font-size:12.5px" data-fkey="outputs" data-id="' + esc(id) + '" value="' + esc(n.outputs) + '" placeholder="예: 시운전 결과보고서 / SAP" /></div>';
    }
    return '<div class="panel">' + head + '<div class="pbody scroll">' + fields + "</div></div>";
  }

  // 계층 편집 본문은 crumb 바 + (보드|아웃라인) + 패널 → body 안에 나란히 두려면 flex-column 래핑 필요
  function bodyViewTree() { return crumbBar() + '<div class="body" style="flex:1">' + (S.viewMode === "outline" ? outline() : columns()) + panel() + "</div>"; }

  function pageDomain() {
    var keys = ["dept", "tech", "automation_level", "frequency"];
    var tabs = keys.map(function (k) { return '<button class="stab' + (S.domTab === k ? " on" : "") + '" data-act="domtab" data-k="' + k + '">' + esc(DL[k]) + ' <span style="opacity:.55">' + (S.domains[k] || []).length + "</span></button>"; }).join("");
    var dk = S.domTab;

    return '<div class="page scroll"><div class="pw"><div class="h1">도메인 관리</div><div class="sub">카드 상세에서 고르는 선택 목록입니다. 값 이름을 바꾸면 그 값을 쓰는 업무도 함께 바뀝니다. 사용 중인 값은 삭제할 수 없습니다.</div>'
      + '<div class="subtabs">' + tabs + "</div>"
      + '<div class="cardbox"><div class="dhead"><span>값</span><span>사용 중</span><span></span></div>' + rows
      + '<div style="padding:13px 16px"><button class="dadd" data-act="domadd" data-k="' + dk + '">＋ 값 추가</button></div></div>'
      + '<div style="font-size:11.5px;color:#a8a29e;margin-top:12px">변경은 상단 <b>저장</b> 을 눌러야 파일에 반영됩니다.</div></div></div>';
  }

  function pageExcel() {
    var st = stats();
    var sub = ["up", "down"].map(function (k) { return '<button class="stab' + (S.excelTab === k ? " on" : "") + '" data-act="exceltab" data-k="' + k + '">' + (k === "up" ? "⬆ 가져오기 (일괄등록)" : "⬇ 내보내기") + "</button>"; }).join("");
    var pane = "";
    if (S.excelTab === "up") {
      pane = '<div class="cardbox" style="padding:22px"><label class="drop" for="xlsxup"><div style="font-size:26px">⬆</div><div style="font-size:13px;font-weight:700;color:#57534e;margin-top:6px">수정한 엑셀 파일을 여기에 올리세요 (.xlsx)</div><div style="font-size:11.5px;color:#a8a29e;margin-top:3px">내보내기 탭에서 받은 파일이어야 읽을 수 있습니다</div></label>'
        + '<input id="xlsxup" type="file" accept=".xlsx" style="display:none" data-fkey="xlsxfile" />'
        + '<div style="margin-top:18px;font-size:12px;font-weight:800;color:#57534e">엑셀 작성 규칙</div><ul style="margin:8px 0 0;padding-left:18px;font-size:12px;color:#78716c;line-height:1.9"><li>lv3~lv6 칸을 <b>왼쪽부터 연속으로</b> 채웁니다.</li><li>상위 업무는 자기 행이 반드시 있어야 합니다.</li><li><code style="background:#f0ede6;padding:1px 5px;border-radius:4px">id</code> 가 비어 있으면 새 업무로 등록됩니다.</li><li>AI·기술·부서 같은 세부 정보는 <b>lv6 세부업무</b> 행에만 채웁니다.</li><li>엑셀에서 행을 지워도 기본은 삭제되지 않습니다 (반영 전 확인).</li></ul></div>';
    } else {
      pane = '<div class="cardbox" style="padding:22px"><div style="font-size:12.5px;color:#78716c;line-height:1.55">설계 결과를 엑셀로 받습니다. 이 파일을 고쳐 [가져오기] 에 올리면 일괄 반영됩니다. 시트 3장 — 계층도 / 도메인 / 요약.</div>'
        + '<label style="display:flex;align-items:center;gap:9px;margin:16px 0;cursor:pointer"><input type="checkbox" data-fkey="mask"' + (S.mask ? " checked" : "") + ' style="width:16px;height:16px;accent-color:#0f766e" /><span style="font-size:12.5px;font-weight:600;color:#44403c">담당자 이름 마스킹 (홍길동 → 홍*동)</span></label>'
        + (!S.mask ? '<div class="warn" style="margin-bottom:14px">⚠ 마스킹을 끄면 개인정보가 담긴 파일이 됩니다. 외부 공유에 주의하세요.</div>' : "")
        + '<div style="display:flex;gap:10px"><button class="primary" style="flex:1" data-act="down" data-fmt="xlsx">엑셀 다운로드 (.xlsx)</button><button class="secondary" style="flex:1" data-act="down" data-fmt="json">JSON 원본 다운로드</button></div></div>';
    }
    var metrics = [["전체 업무", st.total, "lv3~lv6 전 레벨"], ["세부업무(lv6)", st.detail, "AI 지표의 분모"], ["AI 에이전트 적용", st.ai, st.rate + "%"], ["미적용", st.detail - st.ai, "lv6 중"]]
      .map(function (m) { return '<div class="metric"><div class="l">' + m[0] + '</div><div class="v">' + m[1] + '</div><div class="h">' + m[2] + "</div></div>"; }).join("");
    var byLevel = [3, 4, 5, 6].map(function (lv) { return '<div class="tr"><span>lv' + lv + " " + esc(LABELS[lv]) + '</span><b>' + S.nodes.filter(function (n) { return n.level === lv; }).length + "</b></div>"; }).join("");
    var dc = {}; S.nodes.filter(function (n) { return hasDetail(n.level); }).forEach(function (n) { var d = n.dept || "(미지정)"; dc[d] = (dc[d] || 0) + 1; });
    var byDept = Object.keys(dc).sort(function (a, b) { return dc[b] - dc[a]; }).map(function (k) { return '<div class="tr"><span>' + esc(k) + '</span><b>' + dc[k] + "</b></div>"; }).join("");
    return '<div class="page scroll"><div class="pw"><div class="h1">엑셀 가져오기 / 내보내기</div><div class="sub">업무가 많을 때는 화면에서 하나씩 만들지 말고 엑셀로 한 번에 등록·수정하세요.</div>'
      + '<div class="subtabs">' + sub + "</div>" + pane

  }

  function pageHistory() {

    var rows = hist.map(function (h, i) { return '<div class="histrow' + (S.histPick === i ? " sel" : "") + '" data-act="histpick" data-i="' + i + '"><span>' + esc(h.ts) + "</span><span>" + esc(maskName(h.author)) + "</span><span>rev" + esc(h.rev) + "</span><span>" + esc(h.n_nodes) + "개</span></div>"; }).join("");
    var hp = hist[S.histPick] || hist[0] || { ts: "", author: "", rev: 0 };
    var diffs = [["되살아남", [2, 1, 4, 6][S.histPick] || 0, "#166534", "#dcfce7"], ["값이 바뀜", [3, 5, 2, 4][S.histPick] || 0, "#92400e", "#fef3c7"], ["사라짐", [1, 0, 3, 2][S.histPick] || 0, "#b91c1c", "#fee2e2"]]
      .map(function (d) { return '<div class="diff" style="background:' + d[3] + '"><div class="dv" style="color:' + d[2] + '">' + d[1] + '</div><div class="dl" style="color:' + d[2] + '">' + d[0] + "</div></div>"; }).join("");
    var can = S.restoreOk && !!S.author;

    var auditRows = aud.map(function (a) { var lab = ACT[a.action] || a.action; var stl = a.action === "force" ? "background:#fef3c7;color:#92400e" : a.action === "restore" ? "background:#e0e7ff;color:#3730a3" : "background:#ccfbf1;color:#115e59"; return '<div style="display:grid;grid-template-columns:1.5fr 1fr 1fr .6fr .6fr;gap:8px;align-items:center;padding:9px 14px;border-bottom:1px solid #f7f4ee;font-size:12.5px"><span>' + esc((a.ts || "").replace("T", " ")) + "</span><span>" + esc(maskName(a.author)) + '</span><span><span class="actx" style="' + stl + '">' + esc(lab) + "</span></span><span>rev" + esc(a.rev) + "</span><span>" + esc(a.n_nodes) + "개</span></div>"; }).join("");
    return '<div class="page scroll"><div class="pw"><div class="h1">이력 · 복원</div><div class="sub">저장할 때마다 직전 버전이 스냅샷으로 보관됩니다 (최근 90일 + 최신 50개).</div>'
      + '<div class="cardbox" style="margin-top:18px"><div class="histrow" style="background:#faf8f3;color:#a8a29e;font-size:11px;font-weight:800;cursor:default"><span>시각</span><span>작성자</span><span>rev</span><span>업무 수</span></div>' + rows + "</div>"
      + '<div class="cardbox" style="padding:20px;margin-top:16px"><div style="font-size:12px;font-weight:800;color:#57534e">복원할 시점</div><div style="font-size:13px;font-weight:700;color:#0f766e;margin:6px 0 16px">' + esc(hp.ts) + " · " + esc(maskName(hp.author)) + " · rev" + esc(hp.rev) + "</div>"
      + '<div style="font-size:12px;font-weight:800;color:#57534e;margin-bottom:9px">지금 화면과의 차이 (복원하면 이렇게 바뀝니다)</div><div class="diffgrid">' + diffs + "</div>"
      + '<label style="display:flex;align-items:center;gap:9px;margin:18px 0 0;cursor:pointer"><input type="checkbox" data-fkey="restoreok"' + (S.restoreOk ? " checked" : "") + ' style="width:16px;height:16px;accent-color:#0f766e" /><span style="font-size:12.5px;color:#44403c">위 내용을 확인했고 이 시점으로 되돌립니다</span></label>'
      + '<div style="margin-top:14px"><button class="' + (can ? "primary" : "") + '" style="' + (can ? "" : "background:#cabfb0;color:#fff;border:none;border-radius:9px;padding:9px 18px;font-weight:800;cursor:not-allowed") + 'padding:9px 18px" data-act="restore">이 시점으로 복원</button></div></div>'
      + '<div style="font-size:13.5px;font-weight:800;margin:24px 0 10px">저장 기록</div><div class="cardbox"><div style="display:grid;grid-template-columns:1.5fr 1fr 1fr .6fr .6fr;gap:8px;padding:10px 14px;background:#faf8f3;border-bottom:1px solid #f4f1ea;font-size:11px;font-weight:800;color:#a8a29e"><span>시각</span><span>작성자</span><span>동작</span><span>rev</span><span>업무</span></div>' + auditRows + "</div></div></div>";
  }

  // ── 렌더 / 포커스 복원 ──────────────────────────────
  function fullView() {
    var body;
    if (S.activeTab === 0) body = '<div class="treewrap">' + crumbBar() + '<div class="body">' + (S.viewMode === "outline" ? outline() : columns()) + panel() + "</div></div>";
    else if (S.activeTab === 1) body = pageDomain();
    else if (S.activeTab === 2) body = pageExcel();
    else body = pageHistory();
    return topbar() + banners() + body;
  }
  function rerender(focusSel) {
    contentEl.innerHTML = fullView();
    wireDnD();          // innerHTML 로 DOM 을 갈아끼웠으므로 Sortable 을 다시 붙인다
    layout();
    if (focusSel) { var el = contentEl.querySelector(focusSel); if (el) { el.focus(); try { var v = el.value; el.setSelectionRange(v.length, v.length); } catch (e) {} } }
  }
  function layout() {
    // iframe 높이 자동 — Streamlit 스크롤은 컴포넌트 안에서 처리한다
    var target = IN_ST ? 820 : (document.querySelector(".app") ? document.querySelector(".app").offsetHeight : 820);
    if (IN_ST) setHeight(824);
  }

  // ── 이벤트 위임 (한 번만 바인딩) ─────────────────────
  var _dragging = false;
  function onClick(e) {
    if (_dragging) return;          // 드래그 끝에 딸려오는 click 이 select 로 새지 않게
    var el = e.target.closest("[data-act]"); if (!el) return;
    var a = el.dataset.act, d = el.dataset;
    if (a === "tab") S.activeTab = +d.i, rerender();
    else if (a === "viewcols") S.viewMode = "columns", rerender();
    else if (a === "viewout") S.viewMode = "outline", rerender();
    else if (a === "select") actSelect(d.id);
    else if (a === "add") actAdd(d.pid, +d.lv);
    else if (a === "toggle") actToggle(d.id);
    else if (a === "collapse") actCollapseAll();
    else if (a === "del") actDel(d.id);
    else if (a === "tech") actToggleTech(d.id, d.t);
    else if (a === "save") doSave();
    else if (a === "domtab") S.domTab = d.k, rerender();
    else if (a === "domadd") domAdd(d.k);
    else if (a === "domdel") domDelete(d.k, +d.i);
    else if (a === "exceltab") S.excelTab = d.k, rerender();
    else if (a === "down") emit({ type: "download", fmt: d.fmt, mask: S.mask, nodes: S.nodes, domains: S.domains });
    else if (a === "histpick") S.histPick = +d.i, S.restoreOk = false, rerender();
    else if (a === "restore") { if (!S.author) return flash("작성자를 먼저 입력하세요"); if (!S.restoreOk) return; var hist = S.history.length ? S.history : MOCK_HIST; emit({ type: "restore", file: (hist[S.histPick] || {}).file, author: S.author }); }
    else if (a === "reload") emit({ type: "reload" });
    else if (a === "force") emit({ type: "force", rev: S.rev, author: S.author, nodes: S.nodes, domains: S.domains });
    else if (a === "dismiss") { S.conflict = null; rerender(); }
  }
  function onInput(e) {
    var el = e.target.closest("[data-fkey]"); if (!el) return;
    var f = el.dataset.fkey;
    if (f === "author") { S.author = el.value; var b = contentEl.querySelector(".badge"); var sv = contentEl.querySelector(".save"); if (sv) { var can = !!S.author && S.dirty.length > 0; sv.className = "save " + (can ? "on" : "off"); } return; }
    if (f === "name") return actUpdate(el.dataset.id, "name", el.value, '[data-fkey="name"]');
    if (f === "desc") return actUpdate(el.dataset.id, "desc", el.value, '[data-fkey="desc"]');
    if (f === "owner") return actUpdate(el.dataset.id, "owner", el.value, '[data-fkey="owner"]');
    if (f === "outputs") return actUpdate(el.dataset.id, "outputs", el.value, '[data-fkey="outputs"]');
    if (f === "dom") return domRename(el.dataset.k, +el.dataset.i, el.value, '[data-fkey="dom"][data-i="' + el.dataset.i + '"]');
  }
  function onChange(e) {
    var el = e.target.closest("[data-fkey]"); if (!el) return;
    var f = el.dataset.fkey;
    if (f === "ai") return actUpdate(el.dataset.id, "has_ai_agent", el.checked);
    if (f === "dept" || f === "automation_level" || f === "frequency") return actUpdate(el.dataset.id, f, el.value);
    if (f === "mask") { S.mask = el.checked; rerender(); return; }
    if (f === "restoreok") { S.restoreOk = el.checked; rerender(); return; }
    if (f === "xlsxfile") {
      var file = el.files && el.files[0]; if (!file) return;
      var rd = new FileReader();
      rd.onload = function () { var b64 = String(rd.result).split(",")[1] || ""; emit({ type: "import", filename: file.name, b64: b64 }); flash("업로드 파일을 확인하는 중… (반영 후 결과 표시)"); };
      rd.readAsDataURL(file);
    }
  }

  // ── 초기화 / Streamlit 렌더 수신 ────────────────────
  function applyArgs(args) {
    if (args.tree) { S.nodes = (args.tree.nodes || []).map(function (n) { return Object.assign({}, n); }); S.domains = JSON.parse(JSON.stringify(args.tree.domains || DEF_DOMAINS)); S.rev = args.tree.rev || 0; }
    if (typeof args.author === "string") S.author = args.author;
    S.env = args.env || "";
    S.history = args.history || [];
    S.audit = args.audit || [];
    S.conflict = args.conflict || null;
    S.diskNewer = args.disk_newer || null;
    S.dirty = [];               // 저장 성공 후 재렌더 시 초기화
    if (args.dirty_all) S.dirty = S.nodes.map(function (n) { return n.id; }).concat(["dom"]);  // 엑셀 반영 직후: 전부 미저장
    if (typeof args.flash === "string" && args.flash) flash(args.flash);
    if (S.histPick >= (S.history.length || 1)) S.histPick = 0;
  }
  function boot() {
    appEl = document.getElementById("app");
    appEl.className = "app";
    contentEl = document.createElement("div");
    contentEl.style.display = "flex";
    contentEl.style.flexDirection = "column";
    contentEl.style.height = IN_ST ? "820px" : "820px";
    appEl.appendChild(contentEl);
    appEl.addEventListener("click", onClick);
    appEl.addEventListener("input", onInput);
    appEl.addEventListener("change", onChange);
    rerender();
  }

  window.addEventListener("message", function (e) {
    if (!e.data || e.data.type !== "streamlit:render") return;
    IN_ST = true;
    try { applyArgs(e.data.args || {}); if (!appEl) boot(); else rerender(); }
    catch (err) { if (appEl) contentEl.innerHTML = '<div style="padding:20px;color:#b91c1c">화면 오류: ' + esc(err && err.message) + "</div>"; }
  });

  // 단독 미리보기: 300ms 안에 Streamlit render 가 안 오면 시드로 뜬다
  setTimeout(function () { if (!IN_ST) { S.nodes = seed(); S.domains = JSON.parse(JSON.stringify(DEF_DOMAINS)); S.history = MOCK_HIST; S.audit = MOCK_AUDIT; boot(); } }, 300);

  send({ type: "streamlit:componentReady", apiVersion: 1 });
})();
</script>
</body>
</html>
