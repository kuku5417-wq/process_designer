<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<!--
  process_board_v2 — 프로세스 설계 프론트엔드 (Streamlit 정적 커스텀 컴포넌트, npm 빌드 없음)

  ★ 기존 index.html 과의 핵심 차이:
    - 예전 보드는 "보이는 4컬럼"만 담고 이벤트 1건만 되돌렸다.
    - v2 는 전체 트리를 브라우저가 들고 편집하며, [저장] 시 tree 전체를 되돌린다.
      → 파이썬(app.py)이 store.save_tree 로 원자적 저장 + 스냅샷 + 충돌검사.
  ★ 모든 postMessage 에 isStreamlitMessage:true 필수. send() 한 곳에서만 postMessage.
  ★ 순서: componentReady → 부모 streamlit:render → setFrameHeight → (조작) setComponentValue.
  ★ render() 안에서는 setComponentValue 를 부르지 않는다(무한 리런). 사용자 조작에서만.
  ★ 파이썬이 넘겨주는 args: { tree:{nodes,domains,rev}, author, env, history:[], audit:[],
      flash:"", conflict:null|{...} }. 컴포넌트가 되돌리는 값: { type, evt_id, ... }.

  ★ 드래그(SortableJS, 로컬 번들 · MIT): 트리를 브라우저가 통째로 들고 있으므로 드래그는
    S.nodes 만 고치고 서버 왕복이 없다. group 을 레벨별(L3~L6)로 분리해 lv4 카드가 lv6
    컬럼에 떨어지는 사고를 구조적으로 막는다 — 같은 레벨끼리만 오가므로 레벨 변경·사이클이
    원천적으로 불가능하다. forceFallback: iframe 안에서 pointer 이벤트가 더 일관되고
    드래그 중 자동 스크롤을 얻는다(네이티브 dragenter 가 없어 강조는 :hover CSS 로 처리).
-->
<script src="./sortable.min.js"></script>
<style>

  /* ── 확인 모달 (되돌릴 수 없는 조작) ── */

  .modal { background: #fff; border-radius: 14px; padding: 24px; max-width: 440px; width: 100%;

  .modal .mtitle { font-size: 15px; font-weight: 800; color: #1c1917; }
  .modal .mbody { margin-top: 9px; font-size: 12.5px; color: #57534e; line-height: 1.6; }
  .modal .mbtns { margin-top: 20px; display: flex; gap: 8px; justify-content: flex-end; }
  .modal button { font-size: 12.5px; font-weight: 800; padding: 9px 16px; border-radius: 9px;
    border: none; cursor: pointer; }
  .modal .mcancel { background: #f0ede6; color: #57534e; }
  .modal .mdanger { background: #b91c1c; color: #fff; }

  /* ── 드래그 (SortableJS) ── */
  .card { cursor: grab; }
  body.dragging .card { cursor: grabbing; }
  .sgh { opacity: .35; }                                  /* 원래 자리 고스트 */
  .sch { box-shadow: 0 6px 18px rgba(15,23,42,.22); }     /* 집어든 카드 */
  /* 자식 드롭존 — 드래그 중, 받을 수 있는 레벨의 카드에서만 나타난다 */
  .cdrop { display: none; margin-top: 8px; border: 2px dashed #cabfb0; border-radius: 8px;
    min-height: 26px; background: #faf8f3; }
  .cdrop::after { content: "여기로 옮기기"; display: block; text-align: center;
    font-size: 9.5px; color: #b8b0a4; line-height: 22px; }
  body.dragL4 .cdrop.acc4, body.dragL5 .cdrop.acc5, body.dragL6 .cdrop.acc6 { display: block; }
  /* forceFallback 이라 네이티브 dragenter 가 없다 — 고스트는 pointer-events 가 없어 :hover 가 걸린다 */
  body.dragging .cdrop:hover { border-color: #0f766e; background: #ccfbf1; }

  .tog { width: 22px; text-align: center; font-size: 10px; color: #a8a29e; padding: 10px 0; flex: none; }
  .rowmain { flex: 1; display: flex; align-items: center; gap: 8px; padding: 8px; cursor: pointer; min-width: 0; }
  .lvb { font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 4px; flex: none; }

  .lvb.g { background: #f0ede6; color: #78716c; }

  .rowdesc { font-size: 10.5px; color: #a8a29e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;

  .rowadd { font-size: 15px; font-weight: 800; color: #b8b0a4; background: transparent; border: none;

  /* 사이드 패널 */
  .panel { width: 392px; flex: none; background: #fff; border-left: 1px solid #e7e1d6; display: flex;

  .plv.g { background: #f0ede6; color: #57534e; }
  .punsaved { font-size: 10.5px; font-weight: 700; color: #92400e; background: #fef3c7; padding: 2px 7px;

  .pname { margin-top: 8px; font-size: 13.5px; font-weight: 800; line-height: 1.3; word-break: break-all; }

  .pbody { flex: 1; overflow-y: auto; padding: 16px 18px; display: flex; flex-direction: column; gap: 11px; }
  .fl { font-size: 11.5px; font-weight: 700; color: #57534e; margin-bottom: 5px; }
  .fi { width: 100%; font-size: 13px; padding: 9px 11px; border: 1px solid #d8cfc0; border-radius: 9px; outline: none; }

  /* 일반 화면 (도메인/엑셀/이력) */

  .cardbox { background: #fff; border: 1px solid #ece6da; border-radius: 14px; overflow: hidden; }

  var _sorts = [];
  function endDrag(lv) {
    // 드래그 흔적을 확실히 지운다. 남으면 드롭존이 계속 보이고 _dragging 가드에 클릭이 막힌다.
    document.body.classList.remove("dragging", "dragL3", "dragL4", "dragL5", "dragL6");
    setTimeout(function () { _dragging = false; }, 0);
  }
  function wireDnD() {
    _sorts.forEach(function (s) { try { s.destroy(); } catch (e) {} });
    _sorts = [];
    endDrag();     // rerender 로 DOM 이 갈렸으므로 드래그 상태도 초기화
    if (typeof Sortable === "undefined" || S.viewMode !== "columns") return;
    var opt = { forceFallback: true, fallbackOnBody: true, fallbackTolerance: 3, animation: 140,
                ghostClass: "sgh", chosenClass: "sch", scroll: true, scrollSensitivity: 60, scrollSpeed: 12 };

    // (A) 컬럼 안 — 형제 순서 변경
    [].forEach.call(contentEl.querySelectorAll(".list[data-lv]"), function (el) {
      var lv = el.dataset.lv;
      _sorts.push(Sortable.create(el, Object.assign({}, opt, {
        group: { name: "L" + lv, pull: true, put: ["L" + lv] },
        draggable: ".card", filter: ".addbtn,.cdrop",
        onStart: function () { _dragging = true; document.body.classList.add("dragging", "dragL" + lv); },
        onEnd: function (e) {
          endDrag();
          if (e.from !== e.to) return;                  // 드롭존 경유는 (B) 가 처리
          if (e.oldIndex === e.newIndex) return;
          var pid = e.from.dataset.parent;
          var ids = [].map.call(e.from.querySelectorAll(":scope > .card"), function (c) { return c.dataset.id; });
          // 다음 틱으로 미룬다 — 콜백 안에서 rerender 하면 wireDnD 가 드래그 중인
          // Sortable 을 파괴해 뒷정리가 끊긴다
          setTimeout(function () { actReorder(pid, ids); }, 0);
        },
      })));
    });

    // (B) 카드 안 드롭존 — 상위 바꾸기 (레벨은 유지)
    [].forEach.call(contentEl.querySelectorAll(".cdrop[data-parent]"), function (el) {
      var lv = Number(el.closest(".card").dataset.lv) + 1;
      _sorts.push(Sortable.create(el, Object.assign({}, opt, {
        group: { name: "L" + lv, pull: false, put: ["L" + lv] }, sort: false,
        // onAdd 는 Sortable 의 뒷정리(onEnd) 전에 불린다. 여기서 바로 rerender 하면
        // 드래그 중인 인스턴스가 파괴돼 onEnd 가 영영 안 오고, dragging 클래스와
        // _dragging 가드가 남아 앱 전체가 클릭 불능이 된다. 다음 틱으로 미룬다.
        onAdd: function (e) {
          var id = e.item.dataset.id, pid = el.dataset.parent;
          e.item.remove();                               // 파이썬/상태 재렌더가 정본 — DOM 은 버린다
          setTimeout(function () { actMove(id, pid); }, 0);
        },
      })));
    });
  }

  function actToggle(id) { S.collapsed[id] = !S.collapsed[id]; rerender(); }
  function actCollapseAll() { var anyOpen = S.nodes.some(function (n) { return childrenOf(n.id).length && !S.collapsed[n.id]; }); if (anyOpen) { var c = {}; S.nodes.forEach(function (n) { if (childrenOf(n.id).length) c[n.id] = true; }); S.collapsed = c; } else S.collapsed = {}; rerender(); }
  function domRename(key, idx, val, refocus) {
    var old = S.domains[key][idx];
    // 다른 행과 겹치는 이름은 거부 — 같은 값이 두 줄이 되면 어느 쪽을 쓰는지 알 수 없다
    var dup = (S.domains[key] || []).some(function (v, i) { return i !== idx && v === val && val.trim(); });
    if (dup) { flash("'" + val + "' 은(는) 이미 목록에 있습니다"); rerender(refocus); return; }
    S.domains[key][idx] = val;
    S.nodes.forEach(function (n) { if (key === "tech") n.tech = (n.tech || []).map(function (t) { return t === old ? val : t; }); else if (n[key] === old) n[key] = val; });
    markDirty("dom"); rerender(refocus);
  }
  function domAdd(key) {
    var base = S.domains[key] || [], nm = "새 값", i = 2;
    while (base.indexOf(nm) >= 0) nm = "새 값 " + i++;   // 중복 없이 늘려간다
    S.domains[key] = base.concat([nm]); markDirty("dom"); rerender();
  }
  function domDelete(key, idx) { var v = S.domains[key][idx]; if (domUsage(key, v) > 0) { flash("사용 중이라 삭제할 수 없습니다"); return; } S.domains[key].splice(idx, 1); markDirty("dom"); rerender(); }

  function doSave() {

        + "</div>"
        + '<div><div class="fl">활용 기술 <span style="color:#a8a29e;font-weight:600">· 눌러서 선택</span></div><div class="techrow">' + techChips + "</div>"
        // 도메인 탭까지 가지 않고 여기서 바로 새 기술을 만든다 (v1 "목록에 없는 기술 추가")
        + '<input class="fi" style="font-size:12px;padding:7px 9px;margin-top:7px" data-fkey="newtech" data-id="' + esc(id) + '" value="" placeholder="목록에 없는 기술 추가 — 입력 후 Enter (쉼표로 여러 개)" /></div>'
        + '<div><div class="fl">산출물 / 연계 시스템</div><input class="fi" style="font-size:12.5px" data-fkey="outputs" data-id="' + esc(id) + '" value="' + esc(n.outputs) + '" placeholder="예: 시운전 결과보고서 / SAP" /></div>';
    }

    // 상위 업무 바꾸기 — 드래그로 불가능한 레벨 변경(승격/강등)의 유일한 경로
    var tg = moveTargets(id), kids = descCount(id);
    fields += '<div style="margin-top:6px;padding-top:14px;border-top:1px dashed #e7e1d6">'
      + '<div class="fl">상위 업무 바꾸기 <span style="color:#a8a29e;font-weight:600">· 레벨도 함께 바뀝니다</span></div>'
      + '<select class="fs" data-fkey="moveto" data-id="' + esc(id) + '">'
      + tg.map(function (t) { return '<option value="' + esc(t.id) + '"' + (t.id === n.parent_id ? " selected" : "") + ">" + esc(t.label) + "</option>"; }).join("")
      + "</select>"
      + (kids ? '<div style="font-size:11.5px;color:#a8a29e;margin-top:5px">하위 업무 ' + kids + "개도 함께 이동하며 레벨이 다시 매겨집니다.</div>" : "")
      + "</div>";

    return '<div class="panel">' + head + '<div class="pbody scroll">' + fields + "</div></div>";
  }

  function pageDomain() {
    var keys = ["dept", "tech", "automation_level", "frequency"];
    var tabs = keys.map(function (k) { return '<button class="stab' + (S.domTab === k ? " on" : "") + '" data-act="domtab" data-k="' + k + '">' + esc(DL[k]) + ' <span style="opacity:.55">' + (S.domains[k] || []).length + "</span></button>"; }).join("");
    var dk = S.domTab;
    var rows = (S.domains[dk] || []).map(function (v, i) { var u = domUsage(dk, v), del = u > 0; return '<div class="drow"><input class="dinput" data-fkey="dom" data-k="' + dk + '" data-i="' + i + '" value="' + esc(v) + '" /><span class="use ' + (u > 0 ? "y" : "n") + '">' + u + '개 업무</span><button class="delbtn" style="' + (del ? "color:#cabfb0;border-color:#e7e1d6;cursor:not-allowed" : "") + '" data-act="domdel" data-k="' + dk + '" data-i="' + i + '">삭제</button></div>'; }).join("");
    return '<div class="page scroll"><div class="pw"><div class="h1">도메인 관리</div><div class="sub">카드 상세에서 고르는 선택 목록입니다. 값 이름을 바꾸면 그 값을 쓰는 업무도 함께 바뀝니다. 사용 중인 값은 삭제할 수 없습니다.</div>'
      + '<div class="subtabs">' + tabs + "</div>"
      + '<div class="cardbox"><div class="dhead"><span>값</span><span>사용 중</span><span></span></div>' + rows
      + '<div style="padding:13px 16px"><button class="dadd" data-act="domadd" data-k="' + dk + '">＋ 값 추가</button></div></div>'
      + '<div style="font-size:11.5px;color:#a8a29e;margin-top:12px">변경은 상단 <b>저장</b> 을 눌러야 파일에 반영됩니다.</div></div></div>';
  }

  // 엑셀 가져오기 — 파일 선택 → 파이썬이 파싱/미리보기 → 확인 → 반영 (2단계).
  // 확인 없이 반영하면 되돌릴 방법이 [디스크 다시 읽기] 뿐이라 위험하다.
  function importPane() {
    var errs = S.importErrors || [];
    if (errs.length) {
      return '<div class="cardbox" style="padding:22px">'
        + '<div class="warn" style="margin-bottom:12px">⚠ 엑셀에 문제가 있습니다. 고친 뒤 다시 올려주세요.</div>'
        + '<div style="max-height:220px;overflow:auto;font-size:12px;color:#78716c;line-height:1.9">'
        + errs.map(function (e) { return "· " + esc(e); }).join("<br/>") + "</div>"
        + '<div style="margin-top:16px"><button class="secondary" data-act="impcancel">다른 파일 올리기</button></div></div>';
    }

    var p = S.importPreview;
    if (!p) {
      return '<div class="cardbox" style="padding:22px"><label class="drop" for="xlsxup"><div style="font-size:26px">⬆</div><div style="font-size:13px;font-weight:700;color:#57534e;margin-top:6px">수정한 엑셀 파일을 여기에 올리세요 (.xlsx)</div><div style="font-size:11.5px;color:#a8a29e;margin-top:3px">내보내기 탭에서 받은 파일이어야 읽을 수 있습니다</div></label>'
        + '<input id="xlsxup" type="file" accept=".xlsx" style="display:none" data-fkey="xlsxfile" />'
        + '<div style="margin-top:18px;font-size:12px;font-weight:800;color:#57534e">엑셀 작성 규칙</div><ul style="margin:8px 0 0;padding-left:18px;font-size:12px;color:#78716c;line-height:1.9">'
        + "<li>lv3~lv6 칸을 <b>왼쪽부터 연속으로</b> 채웁니다. (lv4 를 비우고 lv5 만 채우면 오류)</li>"
        + "<li>상위 업무는 자기 행이 반드시 있어야 합니다.</li>"
        + '<li><code style="background:#f0ede6;padding:1px 5px;border-radius:4px">id</code> 가 비어 있으면 새 업무로 등록됩니다. 기존 업무는 id 를 지우지 마세요.</li>'
        + "<li>AI·기술·부서 같은 세부 정보는 <b>lv6 세부업무</b> 행에만 채웁니다.</li>"
        + "<li>엑셀에서 행을 지워도 <b>기본은 삭제되지 않습니다</b> (반영 전 확인 화면에서 선택).</li>"
        + "<li>담당자가 마스킹된 값(<b>홍*동</b>)이면 원본 이름을 덮어쓰지 않습니다.</li></ul></div>";
    }

    function list(title, rows, color) {
      if (!rows || !rows.length) return "";
      return '<div style="margin-top:12px"><div style="font-size:12px;font-weight:800;color:' + color + ';margin-bottom:6px">' + title + "</div>"
        + '<div class="cardbox" style="max-height:140px;overflow:auto">'
        + rows.map(function (r) { return '<div style="padding:6px 12px;border-bottom:1px solid #f7f4ee;font-size:12px"><span class="lvb g">lv' + esc(r.level) + "</span> " + esc(r.path) + "</div>"; }).join("")
        + "</div></div>";
    }
    var cells = [["추가", p.added, "#166534", "#dcfce7"], ["변경", p.changed, "#92400e", "#fef3c7"], ["삭제", p.removed, "#b91c1c", "#fee2e2"]]
      .map(function (d) { return '<div class="diff" style="background:' + d[3] + '"><div class="dv" style="color:' + d[2] + '">' + esc(d[1]) + '</div><div class="dl" style="color:' + d[2] + '">' + d[0] + "</div></div>"; }).join("");

    var unknown = p.unknown || {}, ukeys = Object.keys(unknown);
    var unknownBox = "";
    if (ukeys.length) {
      unknownBox = '<div class="warn" style="margin-top:14px">도메인 목록에 없는 값이 있습니다 — '
        + ukeys.map(function (k) { return esc((p.labels || {})[k] || k) + ": " + esc(unknown[k].join(", ")); }).join(" / ") + "</div>"
        + '<label style="display:flex;align-items:center;gap:9px;margin-top:10px;cursor:pointer"><input type="checkbox" data-fkey="adddomains"' + (S.addDomains ? " checked" : "") + ' style="width:16px;height:16px;accent-color:#0f766e" /><span style="font-size:12.5px;color:#44403c">이 값들을 도메인 목록에 추가</span></label>';
    }
    var delBox = '<label style="display:flex;align-items:center;gap:9px;margin-top:14px;cursor:' + (p.removed ? "pointer" : "not-allowed") + ';opacity:' + (p.removed ? "1" : ".5") + '">'
      + '<input type="checkbox" data-fkey="delmissing"' + (S.delMissing ? " checked" : "") + (p.removed ? "" : " disabled")
      + ' style="width:16px;height:16px;accent-color:#b91c1c" /><span style="font-size:12.5px;color:#44403c">엑셀에 없는 업무 '
      + esc(p.removed) + "개를 삭제합니다</span></label>"
      + '<div style="font-size:11.5px;color:#a8a29e;margin-top:4px;padding-left:25px">기본은 삭제하지 않습니다. 엑셀에서 행을 지운 것이 실수일 수 있습니다.</div>';

    var nothing = !p.added && !p.changed && !p.removed;
    return '<div class="cardbox" style="padding:22px">'
      + '<div style="font-size:13px;font-weight:800;color:#0f766e;margin-bottom:12px">반영 전 확인</div>'
      + (nothing ? '<div style="font-size:12.5px;color:#78716c">현재 데이터와 차이가 없습니다.</div>' : '<div class="diffgrid">' + cells + "</div>")
      + list("추가될 업무 " + p.added + "개", p.added_list, "#166534")
      + list("변경될 업무 " + p.changed + "개", p.changed_list, "#92400e")
      + list("삭제될 업무 " + p.removed + "개", p.removed_list, "#b91c1c")
      + delBox + unknownBox
      + '<div style="display:flex;gap:8px;margin-top:20px"><button class="secondary" data-act="impcancel">취소</button>'
      + '<button class="primary" data-act="impapply">이 내용으로 반영</button></div>'
      + '<div style="font-size:11.5px;color:#a8a29e;margin-top:10px">반영 후 상단 [저장] 을 눌러야 파일에 기록됩니다.</div></div>';
  }

  function pageExcel() {
    var st = stats();
    var sub = ["up", "down"].map(function (k) { return '<button class="stab' + (S.excelTab === k ? " on" : "") + '" data-act="exceltab" data-k="' + k + '">' + (k === "up" ? "⬆ 가져오기 (일괄등록)" : "⬇ 내보내기") + "</button>"; }).join("");
    var pane = "";
    if (S.excelTab === "up") {
      pane = importPane();
    } else {
      pane = '<div class="cardbox" style="padding:22px"><div style="font-size:12.5px;color:#78716c;line-height:1.55">설계 결과를 엑셀로 받습니다. 이 파일을 고쳐 [가져오기] 에 올리면 일괄 반영됩니다. 시트 3장 — 계층도 / 도메인 / 요약.</div>'
        + '<label style="display:flex;align-items:center;gap:9px;margin:16px 0;cursor:pointer"><input type="checkbox" data-fkey="mask"' + (S.mask ? " checked" : "") + ' style="width:16px;height:16px;accent-color:#0f766e" /><span style="font-size:12.5px;font-weight:600;color:#44403c">담당자 이름 마스킹 (홍길동 → 홍*동)</span></label>'
        + (!S.mask ? '<div class="warn" style="margin-bottom:14px">⚠ 마스킹을 끄면 개인정보가 담긴 파일이 됩니다. 외부 공유에 주의하세요.</div>' : "")
        + '<div style="display:flex;gap:10px"><button class="primary" style="flex:1" data-act="down" data-fmt="xlsx">엑셀 다운로드 (.xlsx)</button><button class="secondary" style="flex:1" data-act="down" data-fmt="json">JSON 원본 다운로드</button></div></div>';
    }
    var metrics = [["전체 업무", st.total, "lv3~lv6 전 레벨"], ["세부업무(lv6)", st.detail, "AI 지표의 분모"], ["AI 에이전트 적용", st.ai, st.rate + "%"], ["미적용", st.detail - st.ai, "lv6 중"]]
      .map(function (m) { return '<div class="metric"><div class="l">' + m[0] + '</div><div class="v">' + m[1] + '</div><div class="h">' + m[2] + "</div></div>"; }).join("");
    var byLevel = [3, 4, 5, 6].map(function (lv) { return '<div class="tr"><span>lv' + lv + " " + esc(LABELS[lv]) + '</span><b>' + S.nodes.filter(function (n) { return n.level === lv; }).length + "</b></div>"; }).join("");
    var dc = {}; S.nodes.filter(function (n) { return hasDetail(n.level); }).forEach(function (n) { var d = n.dept || "(미지정)"; dc[d] = (dc[d] || 0) + 1; });
    var byDept = Object.keys(dc).sort(function (a, b) { return dc[b] - dc[a]; }).map(function (k) { return '<div class="tr"><span>' + esc(k) + '</span><b>' + dc[k] + "</b></div>"; }).join("");
    return '<div class="page scroll"><div class="pw"><div class="h1">엑셀 가져오기 / 내보내기</div><div class="sub">업무가 많을 때는 화면에서 하나씩 만들지 말고 엑셀로 한 번에 등록·수정하세요.</div>'
      + '<div class="subtabs">' + sub + "</div>" + pane
      + '<div style="font-size:13.5px;font-weight:800;margin:24px 0 4px">요약</div><div style="font-size:11.5px;color:#a8a29e;margin-bottom:14px">AI·부서·자동화 지표는 lv6 세부업무만 셉니다.</div>'
      + '<div class="metricgrid">' + metrics + "</div>"
      + '<div class="twocol"><div class="tbl"><div class="th">레벨별 업무 수</div>' + byLevel + '</div><div class="tbl"><div class="th">부서별 세부업무 수</div>' + byDept + "</div></div></div></div>";
  }

  function pageHistory() {
    // ★ 목업(MOCK_HIST/MOCK_AUDIT)은 !IN_ST 단독 미리보기에서만 쓴다. Streamlit 안에서
    //   빈 이력을 목업으로 대체하면 가짜 기록이 진짜처럼 보인다 — seed() 와 같은 규칙.
    var hist = S.history, aud = S.audit;
    var head = '<div class="page scroll"><div class="pw"><div class="h1">이력 · 복원</div>'
      + '<div class="sub">저장할 때마다 직전 버전이 스냅샷으로 보관됩니다 (최근 90일 + 최신 50개).</div>';
    if (!hist.length) {
      return head + '<div class="cardbox" style="padding:28px;margin-top:18px;text-align:center;color:#a8a29e;font-size:13px">'
        + "아직 저장 이력이 없습니다. 저장을 하면 직전 버전이 여기에 쌓입니다.</div></div></div>";
    }
    var rows = hist.map(function (h, i) { return '<div class="histrow' + (S.histPick === i ? " sel" : "") + '" data-act="histpick" data-i="' + i + '"><span>' + esc(h.ts) + "</span><span>" + esc(maskName(h.author)) + "</span><span>rev" + esc(h.rev) + "</span><span>" + esc(h.n_nodes) + "개</span></div>"; }).join("");
    var hp = hist[S.histPick] || hist[0];

    // 실제 diff 는 파이썬(schema.diff)이 계산해 args.diff_preview 로 넘겨준다.
    var dp = S.diffPreview;
    var diffs, removedList = "";
    if (!dp) {
      diffs = '<div style="grid-column:1/-1;color:#a8a29e;font-size:12px;padding:8px 0">차이를 계산하는 중…</div>';
    } else {
      diffs = [["되살아남", dp.added, "#166534", "#dcfce7"], ["값이 바뀜", dp.changed, "#92400e", "#fef3c7"], ["사라짐", dp.removed, "#b91c1c", "#fee2e2"]]
        .map(function (d) { return '<div class="diff" style="background:' + d[3] + '"><div class="dv" style="color:' + d[2] + '">' + esc(d[1]) + '</div><div class="dl" style="color:' + d[2] + '">' + d[0] + "</div></div>"; }).join("");
      if ((dp.removed_list || []).length) {
        removedList = '<div style="margin-top:14px"><div style="font-size:12px;font-weight:800;color:#b91c1c;margin-bottom:7px">복원하면 사라질 업무 ' + dp.removed + "개</div>"
          + '<div class="cardbox" style="max-height:150px;overflow:auto">'
          + dp.removed_list.map(function (r) { return '<div style="padding:7px 12px;border-bottom:1px solid #f7f4ee;font-size:12px"><span class="lvb g">lv' + esc(r.level) + "</span> " + esc(r.path) + "</div>"; }).join("")
          + "</div></div>";
      }
    }
    var dirtyWarn = S.dirty.length
      ? '<div class="warn" style="margin-bottom:14px">⚠ 저장하지 않은 변경 ' + S.dirty.length + "건이 있습니다. 복원하면 사라집니다.</div>" : "";
    var authWarn = !S.author ? '<div class="warn" style="margin-bottom:14px">복원하려면 상단에 작성자를 입력하세요.</div>' : "";
    var can = S.restoreOk && !!S.author;
    var ACT = { save: "저장", force: "강제 덮어쓰기", restore: "복원" };
    var auditRows = aud.length
      ? aud.map(function (a) { var lab = ACT[a.action] || a.action; var stl = a.action === "force" ? "background:#fef3c7;color:#92400e" : a.action === "restore" ? "background:#e0e7ff;color:#3730a3" : "background:#ccfbf1;color:#115e59"; return '<div style="display:grid;grid-template-columns:1.5fr 1fr 1fr .6fr .6fr;gap:8px;align-items:center;padding:9px 14px;border-bottom:1px solid #f7f4ee;font-size:12.5px"><span>' + esc((a.ts || "").replace("T", " ")) + "</span><span>" + esc(maskName(a.author)) + '</span><span><span class="actx" style="' + stl + '">' + esc(lab) + "</span></span><span>rev" + esc(a.rev) + "</span><span>" + esc(a.n_nodes) + "개</span></div>"; }).join("")
      : '<div style="padding:16px;text-align:center;color:#a8a29e;font-size:12px">기록이 없습니다.</div>';
    return head
      + '<div class="cardbox" style="margin-top:18px"><div class="histrow" style="background:#faf8f3;color:#a8a29e;font-size:11px;font-weight:800;cursor:default"><span>시각</span><span>작성자</span><span>rev</span><span>업무 수</span></div>' + rows + "</div>"
      + '<div class="cardbox" style="padding:20px;margin-top:16px"><div style="font-size:12px;font-weight:800;color:#57534e">복원할 시점</div><div style="font-size:13px;font-weight:700;color:#0f766e;margin:6px 0 16px">' + esc(hp.ts) + " · " + esc(maskName(hp.author)) + " · rev" + esc(hp.rev) + "</div>"
      + dirtyWarn + authWarn
      + '<div style="font-size:12px;font-weight:800;color:#57534e;margin-bottom:9px">지금 화면과의 차이 (복원하면 이렇게 바뀝니다)</div><div class="diffgrid">' + diffs + "</div>" + removedList
      + '<label style="display:flex;align-items:center;gap:9px;margin:18px 0 0;cursor:pointer"><input type="checkbox" data-fkey="restoreok"' + (S.restoreOk ? " checked" : "") + ' style="width:16px;height:16px;accent-color:#0f766e" /><span style="font-size:12.5px;color:#44403c">위 내용을 확인했고 이 시점으로 되돌립니다</span></label>'
      + '<div style="margin-top:14px"><button class="' + (can ? "primary" : "") + '" style="' + (can ? "" : "background:#cabfb0;color:#fff;border:none;border-radius:9px;padding:9px 18px;font-weight:800;cursor:not-allowed") + 'padding:9px 18px" data-act="restore">이 시점으로 복원</button></div></div>'
      + '<div style="font-size:13.5px;font-weight:800;margin:24px 0 10px">저장 기록</div><div class="cardbox"><div style="display:grid;grid-template-columns:1.5fr 1fr 1fr .6fr .6fr;gap:8px;padding:10px 14px;background:#faf8f3;border-bottom:1px solid #f4f1ea;font-size:11px;font-weight:800;color:#a8a29e"><span>시각</span><span>작성자</span><span>동작</span><span>rev</span><span>업무</span></div>' + auditRows + "</div></div></div>";
  }

  // 되돌릴 수 없는 조작 앞의 확인 모달 (삭제 / 디스크 다시 읽기)
  function confirmModal() {
    var c = S.confirm; if (!c) return "";
    // 배경 클릭으로 닫지 않는다 — 파괴적 확인창이 실수로 사라지면 안 된다
    return '<div class="modalbg"><div class="modal">'
      + '<div class="mtitle">' + esc(c.title) + "</div>"
      + '<div class="mbody">' + esc(c.body) + "</div>"
      + '<div class="mbtns"><button class="mcancel" data-act="cxcancel">취소</button>'
      + '<button class="' + (c.danger ? "mdanger" : "primary") + '" data-act="cxok">' + esc(c.okLabel || "확인") + "</button></div>"
      + "</div></div>";
  }

  // ── 렌더 / 포커스 복원 ──────────────────────────────
  function fullView() {
    var body;
    if (S.activeTab === 0) body = '<div class="treewrap">' + crumbBar() + '<div class="body">' + (S.viewMode === "outline" ? outline() : columns()) + panel() + "</div></div>";
    else if (S.activeTab === 1) body = pageDomain();
    else if (S.activeTab === 2) body = pageExcel();
    else body = pageHistory();
    return topbar() + banners() + body + confirmModal();
  }
  function rerender(focusSel) {
    contentEl.innerHTML = fullView();
    wireDnD();          // innerHTML 로 DOM 을 갈아끼웠으므로 Sortable 을 다시 붙인다
    layout();
    if (focusSel) { var el = contentEl.querySelector(focusSel); if (el) { el.focus(); try { var v = el.value; el.setSelectionRange(v.length, v.length); } catch (e) {} } }
  }
  function layout() {
    // iframe 높이 자동 — Streamlit 스크롤은 컴포넌트 안에서 처리한다
    var target = IN_ST ? 820 : (document.querySelector(".app") ? document.querySelector(".app").offsetHeight : 820);
    if (IN_ST) setHeight(824);
  }

  // ── 이벤트 위임 (한 번만 바인딩) ─────────────────────
  var _dragging = false;
  function onClick(e) {
    if (_dragging) return;          // 드래그 끝에 딸려오는 click 이 select 로 새지 않게
    var el = e.target.closest("[data-act]"); if (!el) return;
    var a = el.dataset.act, d = el.dataset;
    if (a === "tab") {
      S.activeTab = +d.i; rerender();
      // 이력 탭 진입 시 기본 선택의 diff 를 파이썬에 요청 (안 하면 "계산하는 중…" 에 머문다)
      if (S.activeTab === 3 && S.history.length && !S.diffPreview) actHistPick(S.histPick || 0);
    }
    else if (a === "viewcols") S.viewMode = "columns", rerender();
    else if (a === "viewout") S.viewMode = "outline", rerender();
    else if (a === "select") actSelect(d.id);
    else if (a === "add") actAdd(d.pid, +d.lv);
    else if (a === "toggle") actToggle(d.id);
    else if (a === "collapse") actCollapseAll();
    else if (a === "del") actDel(d.id);
    else if (a === "tech") actToggleTech(d.id, d.t);
    else if (a === "save") doSave();
    else if (a === "domtab") S.domTab = d.k, rerender();
    else if (a === "domadd") domAdd(d.k);
    else if (a === "domdel") domDelete(d.k, +d.i);
    else if (a === "exceltab") S.excelTab = d.k, rerender();
    else if (a === "down") emit({ type: "download", fmt: d.fmt, mask: S.mask, nodes: S.nodes, domains: S.domains });
    else if (a === "histpick") actHistPick(+d.i);
    else if (a === "restore") { if (!S.author) return flash("작성자를 먼저 입력하세요"); if (!S.restoreOk) return; emit({ type: "restore", file: (S.history[S.histPick] || {}).file, author: S.author }); }
    else if (a === "reload") actReload();
    else if (a === "force") emit({ type: "force", rev: S.rev, author: S.author, nodes: S.nodes, domains: S.domains });
    else if (a === "dismiss") { S.conflict = null; rerender(); }
    else if (a === "impapply") emit({ type: "import_apply", delete_missing: S.delMissing, add_domains: S.addDomains });
    else if (a === "impcancel") { S.importPreview = null; S.importErrors = []; S.delMissing = false; rerender(); emit({ type: "import_cancel" }); }
    else if (a === "cxcancel") { S.confirm = null; rerender(); }
    else if (a === "cxok") { var c = S.confirm; S.confirm = null; if (c && c.onOk) c.onOk(); else rerender(); }
  }
  function onInput(e) {
    var el = e.target.closest("[data-fkey]"); if (!el) return;
    var f = el.dataset.fkey;
    if (f === "author") { S.author = el.value; var b = contentEl.querySelector(".badge"); var sv = contentEl.querySelector(".save"); if (sv) { var can = !!S.author && S.dirty.length > 0; sv.className = "save " + (can ? "on" : "off"); } return; }
    if (f === "name") return actUpdate(el.dataset.id, "name", el.value, '[data-fkey="name"]');
    if (f === "desc") return actUpdate(el.dataset.id, "desc", el.value, '[data-fkey="desc"]');
    if (f === "owner") return actUpdate(el.dataset.id, "owner", el.value, '[data-fkey="owner"]');
    if (f === "outputs") return actUpdate(el.dataset.id, "outputs", el.value, '[data-fkey="outputs"]');
    if (f === "dom") return domRename(el.dataset.k, +el.dataset.i, el.value, '[data-fkey="dom"][data-i="' + el.dataset.i + '"]');
    if (f === "query") { S.query = el.value; rerender('[data-fkey="query"]'); return; }
  }
  // Enter 로 확정하는 입력 (목록에 없는 기술 추가)
  function onKeydown(e) {
    if (e.key !== "Enter") return;
    var el = e.target.closest('[data-fkey="newtech"]'); if (!el) return;
    e.preventDefault();
    actAddTech(el.dataset.id, el.value);
  }
  function onChange(e) {
    var el = e.target.closest("[data-fkey]"); if (!el) return;
    var f = el.dataset.fkey;
    if (f === "ai") return actUpdate(el.dataset.id, "has_ai_agent", el.checked);
    if (f === "dept" || f === "automation_level" || f === "frequency") return actUpdate(el.dataset.id, f, el.value);
    if (f === "moveto") return actMoveTo(el.dataset.id, el.value);
    if (f === "query") { S.query = el.value; rerender('[data-fkey="query"]'); return; }
    if (f === "mask") { S.mask = el.checked; rerender(); return; }
    if (f === "restoreok") { S.restoreOk = el.checked; rerender(); return; }
    if (f === "delmissing") { S.delMissing = el.checked; return; }
    if (f === "adddomains") { S.addDomains = el.checked; return; }
    if (f === "xlsxfile") {
      var file = el.files && el.files[0]; if (!file) return;
      var rd = new FileReader();
      // 파싱/미리보기 요청일 뿐 — 반영은 사용자가 [이 내용으로 반영] 을 눌러야 일어난다
      rd.onload = function () { var b64 = String(rd.result).split(",")[1] || ""; emit({ type: "import", filename: file.name, b64: b64 }); flash("엑셀을 읽는 중…"); };
      rd.readAsDataURL(file);
    }
  }

  // ── 초기화 / Streamlit 렌더 수신 ────────────────────
  function applyArgs(args) {
    // ★ 트리는 epoch 이 바뀔 때만 갈아끼운다. 매 렌더마다 덮으면 download·histpick 같은
    //   조회성 왕복에도 화면이 저장본으로 되돌아가 미저장 편집이 조용히 사라진다.
    var ep = args.tree_epoch;
    if (args.tree && (S.treeEpoch === null || ep !== S.treeEpoch)) {
      S.treeEpoch = ep;
      S.nodes = (args.tree.nodes || []).map(function (n) { return Object.assign({}, n); });
      S.domains = JSON.parse(JSON.stringify(args.tree.domains || DEF_DOMAINS));
      S.rev = args.tree.rev || 0;
      S.dirty = [];             // 파이썬이 준 새 정본 = 미저장 변경 없음
      if (args.dirty_all) S.dirty = S.nodes.map(function (n) { return n.id; }).concat(["dom"]);  // 엑셀 반영 직후: 전부 미저장
      // 새 트리에 없는 노드를 가리키던 선택은 버린다 (복원·엑셀 반영 후)
      if (S.selectedId && !byId(S.selectedId)) { S.selectedId = null; S.sel = {}; }
      else if (S.selectedId) selectPath(S.selectedId);
    } else if (args.tree) {
      S.rev = args.tree.rev || 0;   // 저장 충돌 판정용 rev 는 항상 최신으로
    }
    if (typeof args.author === "string" && args.author) S.author = args.author;
    S.env = args.env || "";
    S.history = args.history || [];
    S.audit = args.audit || [];
    S.conflict = args.conflict || null;
    S.diskNewer = args.disk_newer || null;
    S.diffPreview = args.diff_preview || null;
    S.importPreview = args.import_preview || null;
    S.importErrors = args.import_errors || [];
    if (!S.importPreview) S.delMissing = false;   // 다음 업로드에 삭제 옵션이 딸려가지 않게
    if (typeof args.flash === "string" && args.flash) flash(args.flash);
    if (S.histPick >= (S.history.length || 1)) S.histPick = 0;
  }
  function boot() {
    appEl = document.getElementById("app");
    appEl.className = "app";
    contentEl = document.createElement("div");
    contentEl.style.display = "flex";
    contentEl.style.flexDirection = "column";
    contentEl.style.height = IN_ST ? "820px" : "820px";
    appEl.appendChild(contentEl);
    appEl.addEventListener("click", onClick);
    appEl.addEventListener("input", onInput);
    appEl.addEventListener("change", onChange);
    appEl.addEventListener("keydown", onKeydown);
    rerender();
  }

  window.addEventListener("message", function (e) {
    if (!e.data || e.data.type !== "streamlit:render") return;
    IN_ST = true;
    try { applyArgs(e.data.args || {}); if (!appEl) boot(); else rerender(); }
    catch (err) { if (appEl) contentEl.innerHTML = '<div style="padding:20px;color:#b91c1c">화면 오류: ' + esc(err && err.message) + "</div>"; }
  });

  // 단독 미리보기: 300ms 안에 Streamlit render 가 안 오면 시드로 뜬다
  setTimeout(function () { if (!IN_ST) { S.nodes = seed(); S.domains = JSON.parse(JSON.stringify(DEF_DOMAINS)); S.history = MOCK_HIST; S.audit = MOCK_AUDIT; boot(); } }, 300);

  send({ type: "streamlit:componentReady", apiVersion: 1 });
})();
</script>
</body>
</html>
