<!doctype html>
<html lang="ko">

<meta charset="utf-8" />
<!--
  process_board_v2 — 프로세스 설계 프론트엔드 (Streamlit 정적 커스텀 컴포넌트, npm 빌드 없음)

  ★ 기존 index.html 과의 핵심 차이:
    - 예전 보드는 "보이는 4컬럼"만 담고 이벤트 1건만 되돌렸다.
    - v2 는 전체 트리를 브라우저가 들고 편집하며, [저장] 시 tree 전체를 되돌린다.
      → 파이썬(app.py)이 store.save_tree 로 원자적 저장 + 스냅샷 + 충돌검사.
  ★ 모든 postMessage 에 isStreamlitMessage:true 필수. send() 한 곳에서만 postMessage.
  ★ 순서: componentReady → 부모 streamlit:render → setFrameHeight → (조작) setComponentValue.
  ★ render() 안에서는 setComponentValue 를 부르지 않는다(무한 리런). 사용자 조작에서만.
  ★ 파이썬이 넘겨주는 args: { tree:{nodes,domains,rev}, author, env, history:[], audit:[],
      flash:"", conflict:null|{...} }. 컴포넌트가 되돌리는 값: { type, evt_id, ... }.

  ★ 드래그(SortableJS, 로컬 번들 · MIT): 트리를 브라우저가 통째로 들고 있으므로 드래그는
    S.nodes 만 고치고 서버 왕복이 없다. group 을 레벨별(L3~L6)로 분리해 lv4 카드가 lv6
    컬럼에 떨어지는 사고를 구조적으로 막는다 — 같은 레벨끼리만 오가므로 레벨 변경·사이클이
    원천적으로 불가능하다. forceFallback: iframe 안에서 pointer 이벤트가 더 일관되고
    드래그 중 자동 스크롤을 얻는다(네이티브 dragenter 가 없어 강조는 :hover CSS 로 처리).
-->

    color: #1c1917; -webkit-font-smoothing: antialiased; }
  button, input, select, textarea { font-family: inherit; }
  .scroll::-webkit-scrollbar { width: 9px; height: 9px; }
  .scroll::-webkit-scrollbar-thumb { background: #d8cfc0; border-radius: 5px; }
  .app { display: flex; flex-direction: column; background: #eceae5; border-radius: 14px;
    overflow: hidden; border: 1px solid #ddd6ca; }
  /* 단독 배포판(Streamlit iframe 밖)은 창 전체를 채운다 — 모서리 라운드·테두리 제거해 딱 맞춤 */
  html.solo, html.solo body { height: 100%; overflow: hidden; }
  html.solo .app { border: none; border-radius: 0; }

  /* 상단바 */
  .top { display: flex; align-items: center; gap: 16px; padding: 11px 20px; background: #fff;
    border-bottom: 1px solid #e7e1d6; flex: none; flex-wrap: wrap; row-gap: 8px; }
  .top > * { flex: none; }
  .top .grow { flex: 1 1 auto; }
  .treewrap { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .logo { width: 30px; height: 30px; border-radius: 8px; background: #0f766e; color: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 17px; }
  .btitle { font-size: 16.5px; font-weight: 800; letter-spacing: -.2px; line-height: 1.15; }
  .bsub { font-size: 12.5px; color: #a8a29e; font-weight: 600; }
  .tabs { display: flex; gap: 2px; background: #f0ede6; padding: 3px; border-radius: 9px; }
  .tab { padding: 6px 13px; border-radius: 7px; font-size: 14px; font-weight: 700; cursor: pointer;
    white-space: nowrap; color: #78716c; border: none; background: transparent; }
  .tab.on { background: #fff; color: #0f766e; box-shadow: 0 1px 3px rgba(28,25,23,.13); }
  .seg { display: flex; gap: 3px; background: #f0ede6; padding: 3px; border-radius: 9px; }
  .segb { padding: 6px 13px; border-radius: 7px; font-size: 13.5px; font-weight: 700; cursor: pointer;
    color: #78716c; border: none; background: transparent; }
  .segb.on { background: #fff; color: #0f766e; box-shadow: 0 1px 3px rgba(28,25,23,.12); }
  .grow { flex: 1; }
  .pill { display: flex; align-items: center; gap: 8px; padding: 5px 11px; background: #f0fdfa;
    border: 1px solid #99f6e4; border-radius: 9px; }
  .pill b { font-size: 13px; color: #115e59; }
  .pill span { font-size: 12.5px; color: #78716c; }
  .authwrap { display: flex; align-items: center; gap: 7px; }
  .authwrap label { font-size: 13px; color: #a8a29e; font-weight: 600; }
  .authinput { width: 104px; font-size: 14px; padding: 6px 9px; border: 1px solid #e7e1d6;
    border-radius: 8px; outline: none; }
  .authinput:focus { border-color: #0f766e; }
  .badge { font-size: 13.5px; font-weight: 700; padding: 6px 11px; border-radius: 9px; }
  .badge.clean { color: #78716c; background: #f0ede6; }
  .badge.dirty { color: #92400e; background: #fef3c7; border: 1px solid #fde68a; font-weight: 800; }
  .save { font-size: 14.5px; font-weight: 800; padding: 7px 16px; border-radius: 9px; border: none;
    color: #fff; }
  .save.on { background: #0f766e; cursor: pointer; }
  .save.off { background: #cabfb0; cursor: not-allowed; }
  .save.on:hover { filter: brightness(1.08); }

  .crumb { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; padding: 10px 20px;
    background: #faf8f3; border-bottom: 1px solid #f4f1ea; flex: none; }
  .chip { border-radius: 999px; padding: 3px 11px; font-size: 13.5px; font-weight: 700; }
  .chip.fix { background: #e7e1d6; color: #57534e; }
  .chip.cur { background: #0f766e; color: #fff; }
  .sep { color: #cabfb0; font-size: 14px; }
  .crumbtail { font-size: 13px; color: #a8a29e; }
  .crumbsel { border: 1px solid #99f6e4; border-radius: 999px; padding: 3px 12px; font-size: 13.5px;
    font-weight: 800; color: #0f766e; background: #f0fdfa; cursor: pointer; outline: none; }
  .crumbbtn { border: 1px solid #d8cfc0; border-radius: 999px; padding: 3px 9px; font-size: 13px;
    font-weight: 700; cursor: pointer; background: #fff; color: #57534e; margin-left: 4px; }
  .crumbbtn.add { border-color: #99f6e4; color: #0f766e; background: #f0fdfa; }
  .crumbbtn.del { border-color: #f0d9d9; color: #b91c1c; }
  .crumbbtn:hover { filter: brightness(.97); }

  .body { flex: 1; display: flex; min-height: 0; }
  /* 보드는 컬럼 폭만큼만 차지(flex:0) → 남는 폭은 패널이 먹어 상세 입력이 넓어지고, 컬럼~패널 사이
     빈틈이 안 생긴다. 컬럼은 좁게 고정(basis 200, 필요 시 축소). */
  .board { flex: 0 1 auto; display: flex; gap: 12px; padding: 16px; min-width: 0; overflow-x: auto; }
  .col { flex: 0 0 194px; display: flex; flex-direction: column; background: #f8f6f1;
    border: 1px solid #ece6da; border-radius: 12px; overflow: hidden; }
  .col.wide { flex-basis: 233px; }   /* lv5·lv6 은 lv4(194) 의 1.2배 */
  .col.off { opacity: .6; }
  .colhead { display: flex; align-items: center; justify-content: space-between; gap: 6px;
    padding: 10px 12px; border-bottom: 1px solid #ece6da; }
  .colhead .t { font-size: 13.5px; font-weight: 800; color: #57534e; }
  .colhead .n { font-size: 13px; color: #a8a29e; font-weight: 700; }
  .list { flex: 1; overflow-y: auto; padding: 9px; display: flex; flex-direction: column; gap: 7px; }
  .emptyhint { color: #b8b0a4; font-size: 13.5px; padding: 14px 6px; text-align: center; line-height: 1.5; }
  .card { background: #fff; border: 1px solid #e7e1d6; border-left: 3px solid #cabfb0;
    border-radius: 10px; padding: 11px 13px; cursor: pointer; transition: border-color .12s; }
  .card:hover { border-color: #5eead4; }
  .card.sel { background: #f0fdfa; border-color: #0f766e; border-left-color: #0f766e;
    box-shadow: 0 2px 8px rgba(15,118,110,.12); }
  .card.path { background: #f7fdfc; border-left-color: #5eead4; }
  .card .top1 { display: flex; align-items: center; gap: 4px; }
  .card .nm { flex: 1; font-size: 15px; font-weight: 700; line-height: 1.35; word-break: break-all; }
  /* 카드 이름 인라인 편집 — 평소엔 텍스트처럼, 올리면 테두리, 포커스 시 강조 */
  input.nm { width: 100%; min-width: 0; border: 1px solid transparent; background: transparent;
    border-radius: 6px; padding: 2px 5px; font-family: inherit; color: #1c1917; }
  input.nm::placeholder { color: #b8ab99; font-weight: 600; }
  input.nm:hover { border-color: #e7e1d6; background: #fdfcfa; }
  input.nm:focus { outline: none; border-color: #5eead4; background: #fff; box-shadow: 0 0 0 2px rgba(94, 234, 212, .35); }
  /* 카드 삭제 버튼 — 평소엔 옅게, 올리면 빨강 */
  .cdel { flex: none; border: none; background: transparent; color: #cabfb0; cursor: pointer;
    font-size: 13px; line-height: 1; padding: 3px 4px; border-radius: 6px; }
  .cdel:hover { background: #fef2f2; color: #dc2626; }
  .rowdel { flex: none; border: none; background: transparent; color: #cabfb0; cursor: pointer;
    font-size: 13px; line-height: 1; padding: 2px 6px; border-radius: 6px; }
  .rowdel:hover { background: #fef2f2; color: #dc2626; }
  input.rowname { border: 1px solid transparent; background: transparent; border-radius: 6px;
    padding: 1px 4px; font-family: inherit; font-size: 14px; font-weight: 700; color: #1c1917; min-width: 120px; }
  input.rowname::placeholder { color: #b8ab99; }
  input.rowname:hover { border-color: #e7e1d6; background: #fff; }
  input.rowname:focus { outline: none; border-color: #5eead4; background: #fff; box-shadow: 0 0 0 2px rgba(94, 234, 212, .35); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #f59e0b; margin-top: 4px; flex: none;
    box-shadow: 0 0 0 3px #fef3c7; }
  .cdesc { margin-top: 3px; font-size: 12.5px; color: #a8a29e; line-height: 1.4; overflow: hidden;
    white-space: nowrap; text-overflow: ellipsis; }
  .meta { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 4px; }
  .mc { font-size: 11.5px; font-weight: 600; padding: 1px 6px; border-radius: 4px; line-height: 16px; }
  .mc.ai { background: #dcfce7; color: #166534; font-weight: 800; }
  .mc.dept { background: #e0e7ff; color: #3730a3; }
  .mc.kids { background: #fff7ed; color: #9a3412; font-weight: 700; }
  .mc.n { background: #f0ede6; color: #57534e; }
  .mc.occ { background: #ede9fe; color: #5b21b6; font-weight: 700; }
  .mc.load { background: #ccfbf1; color: #0f766e; font-weight: 800; }
  .mc.auto { background: #fef9c3; color: #854d0e; }
  .mc.ship { background: #e0f2fe; color: #075985; }
  .mc.submit { background: #fce7f3; color: #9d174b; font-weight: 800; }
  .addbtn { border: 1.5px dashed #cabfb0; background: #fff; color: #78716c; border-radius: 8px;
    padding: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .addbtn:hover { border-color: #0f766e; color: #0f766e; background: #f0fdfa; }

  .revcap { font-size: 13px; font-weight: 700; color: #a8a29e; white-space: nowrap; }

  /* 연간 공수 — 1회 소요시간 × 연간 횟수 (읽기 전용 파생값) */
  .mh { display: flex; align-items: baseline; gap: 8px; margin-top: 4px; padding: 9px 12px;
    background: #f0fdfa; border: 1px solid #99f6e4; border-radius: 9px; }
  .mh b { font-size: 15.5px; font-weight: 800; color: #0f766e; }
  .mh span { font-size: 12.5px; color: #5eead4; font-weight: 600; }
  .solohint { font-size: 13.5px; color: #a8a29e; padding: 10px 2px 0; line-height: 1.6; }

  /* ── 검색 ── */
  .searchbox { position: relative; display: flex; align-items: center; gap: 6px; flex: none; }
  .searchbox input { width: 190px; font-size: 14px; padding: 6px 10px; border: 1px solid #e7e1d6;
    border-radius: 8px; outline: none; background: #fff; color: #44403c; }
  .searchbox input:focus { border-color: #0f766e; }
  .searchbox .shits { font-size: 13px; font-weight: 800; color: #92400e; background: #fef3c7;
    border-radius: 6px; padding: 2px 7px; white-space: nowrap; }
  /* 검색어에 맞는 카드·행 강조 */
  .card.hit { box-shadow: 0 0 0 2px #f59e0b; }
  .row.hit { background: #fffbeb; }

  /* ── 확인 모달 (되돌릴 수 없는 조작) ── */
  .modalbg { position: fixed; inset: 0; background: rgba(28,25,23,.45); z-index: 900;
    display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: #fff; border-radius: 14px; padding: 24px; max-width: 440px; width: 100%;
    box-shadow: 0 12px 40px rgba(0,0,0,.24); }
  .modal .mtitle { font-size: 17px; font-weight: 800; color: #1c1917; }
  .modal .mbody { margin-top: 9px; font-size: 14.5px; color: #57534e; line-height: 1.6; }
  .modal .mbtns { margin-top: 20px; display: flex; gap: 8px; justify-content: flex-end; }
  .modal button { font-size: 14.5px; font-weight: 800; padding: 9px 16px; border-radius: 9px;
    border: none; cursor: pointer; }
  .modal .mcancel { background: #f0ede6; color: #57534e; }
  .modal .mdanger { background: #b91c1c; color: #fff; }

  /* ── 드래그 (SortableJS) ── */
  .card { cursor: grab; }
  body.dragging .card { cursor: grabbing; }
  .sgh { opacity: .35; }                                  /* 원래 자리 고스트 */
  .sch { box-shadow: 0 6px 18px rgba(15,23,42,.22); }     /* 집어든 카드 */
  /* 자식 드롭존 — 드래그 중, 받을 수 있는 레벨의 카드에서만 나타난다 */
  .cdrop { display: none; margin-top: 8px; border: 2px dashed #cabfb0; border-radius: 8px;
    min-height: 26px; background: #faf8f3; }
  .cdrop::after { content: "여기로 옮기기"; display: block; text-align: center;
    font-size: 11.5px; color: #b8b0a4; line-height: 22px; }
  body.dragL4 .cdrop.acc4, body.dragL5 .cdrop.acc5, body.dragL6 .cdrop.acc6 { display: block; }
  /* forceFallback 이라 네이티브 dragenter 가 없다 — 고스트는 pointer-events 가 없어 :hover 가 걸린다 */
  body.dragging .cdrop:hover { border-color: #0f766e; background: #ccfbf1; }

  /* 아웃라인 */
  .outwrap { flex: 1; display: flex; flex-direction: column; padding: 16px; min-width: 0; }
  .outcard { flex: 1; background: #fff; border: 1px solid #ece6da; border-radius: 12px; display: flex;
    flex-direction: column; overflow: hidden; min-height: 0; }
  .outhead { display: flex; align-items: center; gap: 10px; padding: 11px 16px;
    border-bottom: 1px solid #f4f1ea; flex: none; }
  .outhead .h1 { font-size: 14.5px; font-weight: 800; color: #44403c; }
  .outhead .h2 { font-size: 13px; color: #a8a29e; }
  .minibtn { font-size: 13px; font-weight: 700; color: #78716c; background: #f0ede6; border: none;
    border-radius: 7px; padding: 6px 11px; cursor: pointer; }
  .minibtn.p { color: #fff; background: #0f766e; font-weight: 800; }
  .row { display: flex; align-items: center; border-radius: 8px; margin-bottom: 1px; }
  .row:hover { background: #faf8f3; }
  .row.sel { background: #f0fdfa; box-shadow: inset 3px 0 0 #0f766e; }
  .tog { width: 22px; text-align: center; font-size: 12px; color: #a8a29e; padding: 10px 0; flex: none; }
  .rowmain { flex: 1; display: flex; align-items: center; gap: 8px; padding: 8px; cursor: pointer; min-width: 0; }
  .lvb { font-size: 11px; font-weight: 800; padding: 2px 5px; border-radius: 4px; flex: none; }
  .lvb.d { background: #99f6e4; color: #115e59; }
  .lvb.g { background: #f0ede6; color: #78716c; }
  .rowname { font-size: 14.5px; font-weight: 600; color: #1c1917; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; }
  .rowdesc { font-size: 12.5px; color: #a8a29e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 240px; }
  .rowadd { font-size: 17px; font-weight: 800; color: #b8b0a4; background: transparent; border: none;
    cursor: pointer; padding: 4px 12px; }
  .rowadd:hover { color: #0f766e; }

  /* 사이드 패널 */
  .panel { flex: 1 1 520px; min-width: 480px; background: #fff; border-left: 1px solid #e7e1d6; display: flex;
    flex-direction: column; min-height: 0; }
  .phead { padding: 15px 18px; border-bottom: 1px solid #f4f1ea; }
  .phead.d { background: #f0fdfa; }
  .prow { display: flex; align-items: center; gap: 8px; }
  .ptag { font-size: 12px; font-weight: 800; color: #78716c; background: #f0ede6; padding: 2px 6px;
    border-radius: 5px; }
  .plv { font-size: 12.5px; font-weight: 800; padding: 2px 8px; border-radius: 6px; }
  .plv.d { background: #99f6e4; color: #115e59; }
  .plv.g { background: #f0ede6; color: #57534e; }
  .pdept { font-size: 12.5px; font-weight: 800; padding: 2px 9px; border-radius: 6px;
    background: #e0e7ff; color: #3730a3; }
  .pdept.none { background: #fef3c7; color: #92400e; }
  .punsaved { font-size: 12.5px; font-weight: 700; color: #92400e; background: #fef3c7; padding: 2px 7px;
    border-radius: 5px; }
  .pname { margin-top: 8px; font-size: 15.5px; font-weight: 800; line-height: 1.3; word-break: break-all; }
  .ppath { margin-top: 3px; font-size: 12.5px; color: #a8a29e; }
  .pbody { flex: 1; overflow-y: auto; padding: 16px 18px; display: flex; flex-direction: column; gap: 11px; }
  .fl { font-size: 13.5px; font-weight: 700; color: #57534e; margin-bottom: 5px; }
  .fi { width: 100%; font-size: 15px; padding: 9px 11px; border: 1px solid #d8cfc0; border-radius: 9px; outline: none; }
  .fi:focus, .fa:focus, .fs:focus { border-color: #0f766e; }
  .fa { width: 100%; height: 50px; font-size: 14.5px; padding: 8px 11px; border: 1px solid #d8cfc0;
    border-radius: 9px; outline: none; resize: none; line-height: 1.5; }
  .fs { width: 100%; font-size: 14.5px; padding: 8px 10px; border: 1px solid #d8cfc0; border-radius: 8px;
    outline: none; background: #fff; cursor: pointer; }
  .note { font-size: 13.5px; color: #78716c; background: #f8f6f1; border: 1px solid #f0ede6;
    border-radius: 10px; padding: 12px 13px; line-height: 1.6; }
  .warn { font-size: 13px; color: #92400e; background: #fffbeb; border: 1px solid #fde68a;
    border-radius: 10px; padding: 11px 13px; line-height: 1.55; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  /* 상세 폼 2열 배치 — 넓은 패널의 가로를 채우고 세로 높이를 줄인다 (스크롤 최소화) */
  .pgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; align-items: start; }
  .pcol { display: flex; flex-direction: column; gap: 11px; min-width: 0; }
  .aicard { border-radius: 10px; padding: 8px 12px; border: 1px solid #e7e1d6; background: #f8f6f1; }
  .aicard.on { border-color: #bbf7d0; background: #f0fdf4; }
  .aiflex { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .aiflex input { width: 17px; height: 17px; accent-color: #16a34a; cursor: pointer; }
  .ait { font-size: 14.5px; font-weight: 800; }
  .aih { font-size: 12.5px; color: #a8a29e; margin-top: 1px; }
  .techrow { display: flex; flex-wrap: wrap; gap: 6px; }
  .tchip { font-size: 13.5px; font-weight: 700; padding: 5px 11px; border-radius: 8px; cursor: pointer;
    border: 1px solid #d8cfc0; background: #fff; color: #78716c; }
  .tchip.on { border-color: #0f766e; background: #0f766e; color: #fff; }
  .delbtn { font-size: 13.5px; color: #b91c1c; background: #fff; border: 1px solid #fecaca; border-radius: 8px;
    padding: 8px 13px; cursor: pointer; font-weight: 700; }
  .delbtn:hover { background: #fef2f2; }
  .pempty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; padding: 30px; text-align: center; }

  /* 일반 화면 (도메인/엑셀/이력) */
  .page { flex: 1; overflow-y: auto; padding: 24px 30px; min-height: 0; }
  .pw { max-width: 900px; }
  .h1 { font-size: 19px; font-weight: 800; }
  .sub { font-size: 14.5px; color: #78716c; margin-top: 4px; line-height: 1.55; }
  .subtabs { display: flex; gap: 8px; margin: 18px 0 16px; flex-wrap: wrap; }
  .stab { padding: 8px 15px; border-radius: 9px; font-size: 14.5px; font-weight: 700; cursor: pointer;
    background: #f0ede6; color: #78716c; border: none; }
  .stab.on { background: #0f766e; color: #fff; }
  .cardbox { background: #fff; border: 1px solid #ece6da; border-radius: 14px; overflow: hidden; }
  .dhead, .drow { display: grid; grid-template-columns: 1fr auto auto; gap: 14px; align-items: center; padding: 10px 16px; }
  .dhead { background: #faf8f3; border-bottom: 1px solid #f4f1ea; font-size: 13px; font-weight: 800; color: #a8a29e; }
  .drow { border-bottom: 1px solid #f7f4ee; }
  .dinput { font-size: 15px; font-weight: 600; padding: 8px 11px; border: 1px solid #e7e1d6; border-radius: 8px; outline: none; color: #1c1917; }
  .dinput:focus { border-color: #0f766e; }
  .use { font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 999px; white-space: nowrap; }
  .use.y { background: #ccfbf1; color: #115e59; }
  .use.n { background: #f0ede6; color: #a8a29e; }
  .dadd { font-size: 14.5px; font-weight: 700; color: #0f766e; background: #f0fdfa; border: 1.5px dashed #5eead4;
    border-radius: 9px; padding: 9px 14px; cursor: pointer; }

  .drop { display: flex; flex-direction: column; align-items: center; justify-content: center;

<body>
<div id="app"></div>
<script>
(function () {
  "use strict";

  // ── 모드 / Streamlit 프로토콜 ────────────────────────
  // 축이 둘이다. 하나로 뭉치면 "백엔드는 없지만 데이터는 진짜"인 개인 배포판을 표현할 수 없다.
  //   SOLO  = 빌드타임 상수. build_standalone.py 가 주입한다. 기본값 없음 = 기존 동작 그대로.
  //   IN_ST = 런타임. "streamlit:render 를 받았는가" (전송 계층). 의미를 바꾸지 말 것.
  // 조합: SOLO=false·IN_ST=true  → Streamlit 실서비스
  //       SOLO=false·IN_ST=false → 디자인 단독 미리보기 (seed()/MOCK_* 목업)
  //       SOLO=true              → 개인 배포판 (진짜 데이터, localStorage)
  var SOLO = (typeof window !== "undefined" && window.__PD_SOLO__ === true);
  var IN_ST = false;
  function send(msg) { try { window.parent.postMessage(Object.assign({ isStreamlitMessage: true }, msg), "*"); } catch (e) {} }
  function setHeight(h) { send({ type: "streamlit:setFrameHeight", height: h }); }
  function uid() { try { if (crypto && crypto.randomUUID) return crypto.randomUUID(); } catch (e) {} return "e" + Date.now() + "-" + Math.floor(Math.random() * 1e9); }
  function emit(evt) {
    evt.evt_id = uid();
    if (IN_ST) return send({ type: "streamlit:setComponentValue", value: evt, dataType: "json" });
    if (SOLO) return soloAction(evt);
    return previewAction(evt);          // 디자인 미리보기 — 가짜 플래시만 (이름에 못을 박았다)
  }

  // ── 데이터 모델 (schema.py 와 동일 구조: 평면 노드 + parent_id) ──
  var ROOT = "__root__";
  var LABELS = { 3: "부문", 4: "대분류", 5: "중분류", 6: "세부업무" };
  var FIXED = ["조선", "생산", "시운전"];
  // 부서/과 2단 (부서 → 과). schema.py DEPT_TREE 와 **완전히 같아야 한다**(twin). 노드엔 과만 저장, 부서는 매핑.
  var DEPT_TREE = {
    "시운전1부": ["기장운전1과", "선장운전1과", "전장운전1과"],
    "시운전2부": ["기장운전2과", "선장운전2과", "전장운전2과"],
    "시운전3부": ["ZLNG CSU", "ENI CSU", "CEDAR CSU", "운영"],
    "안벽의장": ["안벽의장1과", "안벽의장2과", "시운전과"],
    "기획운영": ["기획운영"],
    "시운전기술": ["LNG설비운영과", "코멘더"],
    "해운부": ["해운1과", "해운2과"],
  };
  var _DEPT_FLAT = [], _DEPT_PARENT = {};
  Object.keys(DEPT_TREE).forEach(function (b) { DEPT_TREE[b].forEach(function (g) { _DEPT_FLAT.push(g); _DEPT_PARENT[g] = b; }); });
  function deptParent(g) { return _DEPT_PARENT[String(g || "").trim()] || "미분류"; }
  /** 과 목록을 부서별 <optgroup> 으로. 값=과. 매핑에 없는 현재값은 '기타' 그룹에 노출해 유실 방지. */
  function deptOptions(cur) {
    var html = '<option value="">— 선택 —</option>';
    Object.keys(DEPT_TREE).forEach(function (b) {
      html += '<optgroup label="' + esc(b) + '">'
        + DEPT_TREE[b].map(function (g) { return '<option value="' + esc(g) + '"' + (g === cur ? " selected" : "") + ">" + esc(g) + "</option>"; }).join("")
        + "</optgroup>";
    });
    if (cur && _DEPT_FLAT.indexOf(cur) < 0) html += '<optgroup label="기타"><option value="' + esc(cur) + '" selected>' + esc(cur) + "</option></optgroup>";
    return html;
  }
  var DEF_DOMAINS = {
    dept: _DEPT_FLAT.slice(),   // 부서/과 = 과 평면 리스트 (2단은 DEPT_TREE + optgroup 으로 표현)
    tech: ["LLM", "OCR", "RPA", "예측모델", "이상탐지", "BI/대시보드", "챗봇", "음성인식", "컴퓨터비전"],
    automation_level: ["수동", "부분자동", "완전자동", "AI자동"],
    frequency: ["일 1회", "주 1회", "월 1회", "분기", "연 1회", "호선별", "수시"],
    linked_system: ["SAP", "NONSAP"],
  };
  var DL = { dept: "부서/과", tech: "활용기술", automation_level: "자동화 수준", frequency: "수행 주기", linked_system: "연계시스템" };

  function hasDetail(lv) { return Number(lv) >= 6; }

  // ── 작업시간 (schema.annual_hours / schema.annual_count_of 의 쌍둥이) ─────────
  // 연간 공수는 저장하지 않는다 — 두 원본과 어긋날 수 있어 항상 여기서 계산한다.
  function num(v) {
    if (v === null || v === undefined || v === "") return 0;
    var f = parseFloat(String(v).replace(/,/g, "").trim());
    return isFinite(f) ? f : 0;
  }
  // 연간 횟수 = 기간단위 있으면 횟수 × 단위연간수, 없으면 구 데이터의 annual_count 폴백 (schema.annual_count_of 쌍둥이)
  function annualCountOf(n) {
    var u = FREQ_UNITS[String(n.freq_unit || "")];
    if (u) return num(n.freq_count) * u;
    return num(n.annual_count);
  }
  function annualHours(n) { return Math.round(num(n.work_hours) * annualCountOf(n) * 10) / 10; }

  // ── 발생 패턴 (개인 배포판 SOLO 전용) ────────────────────────────────
  // 부하 = "언제·몇 번 하는가" 다. 세 갈래로 갈리고, 그에 따라 필요한 값이 다르다.
  //   상시루틴   호선과 무관. 기간단위 × 횟수 → 연간
  //   호선루틴   그 호선 도는 동안 반복. 기간단위 × 횟수 + 적용구간(복수)
  //              ★ 호선당 총횟수는 저장 안 함 — 구간길이 × 주기 파생. 구간길이는 나중에
  //                trial_schedule 조인. 그래서 주기는 반드시 "단위당 N회"(비율)로 받는다.
  //   호선이벤트 (기준이벤트 + 오프셋) 을 **여러 개** 지정. 지정한 개수가 곧 호선당 횟수다
  //              (GT-7일, AC-7일 각각 해야 하면 두 줄 추가 → 호선당 2회). 시점도 정확히 남는다.
  // ★ 척수는 여기 저장하지 않는다 — 시나리오마다 바뀌므로 원자값만 두고 나중에 곱한다.
  var OCCUR = { ROUTINE: "상시루틴", SHIP_ROUTINE: "호선루틴", SHIP_EVENT: "호선이벤트" };
  var OCCUR_PATTERNS = [OCCUR.ROUTINE, OCCUR.SHIP_ROUTINE, OCCUR.SHIP_EVENT];

  // 기간단위 → 연간 발생수. 단위와 횟수를 나눠야 "주 3회" 가 표현된다
  // (기존 frequency 열거형은 "주 1회" 밖에 없어 3회를 못 적었다).
  var FREQ_UNITS = { "일": 250, "주": 52, "월": 12, "분기": 4, "년": 1 };   // 일 = 근무일 기준
  var FREQ_UNIT_KEYS = ["일", "주", "월", "분기", "년"];

  // trial_schedule.parquet 의 일정구분 — 호선루틴이 어느 구간에 걸리는지 (안벽→앵카링→시운전 순)
  var TRIAL_PHASES = ["LC~GT+1", "GT+1~IE", "AC", "통합시운전", "GasT", "ST,DP", "인도준비"];

  // tbm _PJTEVNT_MAP 12종과 동일. 사외망 더미 milestone 에 G/T 가 없는 건 나중 조인 시
  // 결측 문제일 뿐, 작성자가 고를 옵션에서 뺄 이유가 아니다.
  var MILESTONE_EVENTS = ["W/F", "L/C", "S/P On", "B/T", "G/T", "CMR", "M/T",
                          "I/E", "S/T", "GasT", "ColdT", "D/L"];

  // pjtlist.parquet SHIPTYPE
  var SHIP_TYPES = ["TEU", "KLNGC", "VLCC", "KBULK"];
  var SHIP_TYPE_LABEL = { TEU: "컨테이너", KLNGC: "LNG선", VLCC: "유조선", KBULK: "벌커" };


  function occurOf(n) { return n.occur_pattern || OCCUR.ROUTINE; }
  /** 상시루틴의 연간 횟수 = 횟수 × 단위연간수. (호선 패턴은 척수를 몰라 연간화 불가) */
  function routineAnnualCount(n) {
    var u = FREQ_UNITS[n.freq_unit];
    return u ? num(n.freq_count) * u : 0;
  }
  /** 이 업무의 부하. 단위가 유형마다 다르므로 **kind 를 함께 반환**한다 —
   *  연간(상시)과 호선당(이벤트)을 한 숫자로 더하면 거짓이 된다. */
  function loadOf(n) {
    var p = occurOf(n), h = num(n.work_hours);
    if (p === OCCUR.SHIP_EVENT) {
      // 호선당 횟수 = 지정한 시점 수. 곱셈이 아니라 개수 세기 — 척수는 나중에 곱한다
      var cnt = (n.events || []).length;
      return { kind: "per_ship", hours: Math.round(h * cnt * 10) / 10 };
    }
    if (p === OCCUR.SHIP_ROUTINE) {
      // 구간길이를 모르므로 가짜 숫자를 만들지 않는다
      return { kind: "unresolved", hours: 0 };
    }
    return { kind: "annual", hours: Math.round(h * routineAnnualCount(n) * 10) / 10 };
  }
  /** 이 세부업무의 선종. 이제 lv6 노드 자신이 ship_types 를 들고 있다 (lv4 상속 폐지). */
  function shipTypesOf(id) {
    var n = byId(id);
    return (n && n.ship_types) || [];
  }
  // schema.josa 와 동일 — 한글 받침에 따라 조사 선택 ("부문은" / "대분류는")
  function josa(w, pair) {
    var p = (pair || "은/는").split("/"), a = p[0], b = p[1];
    if (!w) return w;
    var ch = w.charCodeAt(w.length - 1);
    if (ch < 0xAC00 || ch > 0xD7A3) return w + b;
    return w + ((ch - 0xAC00) % 28 ? a : b);
  }
  function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
  function childrenOf(pid) { return S.nodes.filter(function (n) { return n.parent_id === pid; }).sort(function (a, b) { return (a.order - b.order) || String(a.name).localeCompare(b.name); }); }
  function byId(id) { for (var i = 0; i < S.nodes.length; i++) if (S.nodes[i].id === id) return S.nodes[i]; return null; }
  function ancestors(id) { var out = [], cur = byId(id), g = 0; while (cur && cur.parent_id !== ROOT && g++ < 20) { var p = byId(cur.parent_id); if (!p) break; out.unshift(p); cur = p; } return out; }
  function pathNames(id) { var self = byId(id); return FIXED.concat(ancestors(id).map(function (a) { return a.name; })).concat(self ? [self.name] : []); }
  function descCount(id) { var c = 0, st = childrenOf(id).slice(); while (st.length) { var x = st.pop(); c++; st = st.concat(childrenOf(x.id)); } return c; }
  // pii.mask_name 과 동일 규칙이어야 한다 — 화면(JS)과 엑셀(파이썬)의 마스킹이 어긋나면 안 된다.
  // 홍길동→홍*동 / 이순→이* / 남궁길동→남**동 (가운데 전부 가림) / 콤마 그룹은 각각 처리.
  function maskName(n) {
    if (!n) return "";
    return String(n).split(",").map(function (x) {
      x = x.trim();
      if (x.length <= 1) return x;
      if (x.length === 2) return x[0] + "*";
      return x[0] + new Array(x.length - 1).join("*") + x[x.length - 1];
    }).join(", ");
  }
  // ★ id 는 반드시 전역에서 유일해야 한다. 예전엔 "n_"+Date.now()+_seq 였는데 _seq 가
  //   **페이지 로드마다 1로 리셋**돼, 20명이 각자 배포판을 열고 같은 밀리초에 첫 카드를
  //   만들면 같은 id 가 나온다 → 취합 때 서로 다른 업무가 한 노드로 합쳐진다.
  //   schema.new_id() 와 같은 모양("n_"+hex8)을 crypto 난수로 만든다.
  function newId() {
    try {
      if (crypto && crypto.randomUUID) return "n_" + crypto.randomUUID().replace(/-/g, "").slice(0, 8);
      if (crypto && crypto.getRandomValues) {
        var a = new Uint8Array(4); crypto.getRandomValues(a);
        return "n_" + Array.prototype.map.call(a, function (b) { return b.toString(16).padStart(2, "0"); }).join("");
      }
    } catch (e) {}
    return "n_" + Math.random().toString(16).slice(2, 10);
  }
  function makeNode(pid, lv, name) {
    return { id: newId(), parent_id: pid, level: lv, order: 999, name: name || "", desc: "",
             dept: "", has_ai_agent: false, tech: [], automation_level: "", owner: "",
             frequency: "", outputs: "", linked_system: "", linked_system_detail: "",
             work_hours: "", annual_count: "",
             submit_count: "", submit_detail: "",   // 취합 산출물(메인앱 전용) — SOLO 는 항상 빈값
             // lv6 발생 패턴 — 부하의 원자값. ship_types(선종)는 호선 패턴일 때 적용 필터
             occur_pattern: "", freq_unit: "", freq_count: "", ship_types: [],
             apply_phases: [],                        // 호선루틴: 반복 구간(복수)
             events: [] };                            // 호선이벤트: [{event, offset_start, offset_days}] 여러 개
  }
  /** ★ 연간(상시)과 호선당(이벤트)은 단위가 달라 한 숫자로 더하면 거짓이다. 버킷을 나눈다.
   *  호선루틴은 구간길이를 몰라 아직 연간화가 안 되므로 건수만 센다. */
  function stats() {
    var d = S.nodes.filter(function (n) { return hasDetail(n.level); });
    var ai = d.filter(function (n) { return n.has_ai_agent; }).length;
    var annual = 0, perShip = 0, unresolved = 0, missing = 0;
    d.forEach(function (n) {
      var L = SOLO ? loadOf(n) : { kind: "annual", hours: annualHours(n) };
      if (L.kind === "annual") annual += L.hours;
      else if (L.kind === "per_ship") perShip += L.hours;
      else unresolved++;
      if (!L.hours && L.kind !== "unresolved") missing++;
    });
    return { total: S.nodes.length, detail: d.length, ai: ai,
             rate: d.length ? Math.round(ai / d.length * 100) : 0,
             hours: Math.round(annual * 10) / 10,          // 상시루틴만 (진짜 연간)
             perShipHours: Math.round(perShip * 10) / 10,  // 호선당 (연간 아님)
             unresolved: unresolved,                       // 호선루틴 (척수·구간 필요)
             hoursMissing: missing };
  }
  /** 이 도메인 값을 쓰는 업무 수.
   *  ★ 빈 값은 0 이다. `n[key] === ""` 로 세면 **그 필드를 안 채운 모든 노드**가 걸려
   *    (개인 모드는 dept 를 카드에서 안 받으니 전부다) "13개 업무" 같은 거짓 숫자가 뜨고,
   *    삭제 버튼까지 잠긴다. "빈 값을 쓰는 업무" 라는 개념 자체가 없다. */
  function domUsage(key, val) {
    if (!val) return 0;
    var c = 0;
    S.nodes.forEach(function (n) {
      if (key === "tech") { if ((n.tech || []).indexOf(val) >= 0) c++; }
      else if (n[key] === val) c++;
    });
    return c;
  }

    var oldPid = n.parent_id;
    n.parent_id = newPid;
    n.order = childrenOf(newPid).length;
    renumber(oldPid); renumber(newPid);

  // ── 레벨 변경(승격/강등) — schema.apply_move 의 쌍둥이 ──────────
  // 드래그는 같은 레벨끼리만이라 레벨을 못 바꾼다. 잘못된 레벨로 만든 카드를 지우고 다시
  // 만들지 않아도 되게, 상세 패널에서 상위 업무를 바꿔 레벨까지 옮긴다.
  function wouldCycle(id, newPid) {                    // schema.would_cycle
    if (newPid === id) return true;
    if (newPid === ROOT) return false;
    var cur = byId(newPid), seen = {}, g = 0;
    while (cur && g++ < 50) {
      if (cur.id === id) return true;
      if (cur.parent_id === ROOT || seen[cur.parent_id]) return false;
      seen[cur.parent_id] = 1;
      cur = byId(cur.parent_id);
    }
    return false;
  }
  function maxDepthBelow(id) {                          // schema.max_depth_below
    var n = byId(id); if (!n) return 0;
    var desc = [], st = childrenOf(id).slice(), g = 0;
    while (st.length && g++ < 5000) { var x = st.pop(); desc.push(x); st = st.concat(childrenOf(x.id)); }
    if (!desc.length) return 0;
    return Math.max.apply(null, desc.map(function (x) { return x.level; })) - n.level;
  }
  function cascadeLevels(id) {                          // schema._cascade_levels
    var st = [id], g = 0;
    while (st.length && g++ < 5000) {

  /** 옮길 수 있는 상위 후보. 사이클·깊이 초과 대상은 아예 목록에서 뺀다. */
  function moveTargets(id) {
    var depth = maxDepthBelow(id);
    var out = [{ id: ROOT, label: "(최상위) lv3 부문으로", level: 2 }];
    S.nodes.slice().sort(function (a, b) { return (a.level - b.level) || String(a.name).localeCompare(b.name); })
      .forEach(function (t) {
        if (t.id === id || wouldCycle(id, t.id)) return;
        if (t.level + 1 + depth > 6) return;             // 옮기면 lv6 을 넘는 대상 제외
        if (t.level + 1 > 6) return;
        var path = ancestors(t.id).map(function (a) { return a.name; }).concat([t.name]).join(" › ");

  function actMoveTo(id, newPid) {

    var newLevel = newPid === ROOT ? 3 : (byId(newPid) || {}).level + 1;
    if (newLevel > 6) return flash("lv6 아래로는 더 내려갈 수 없습니다");
    if (newLevel + maxDepthBelow(id) > 6) return flash("하위 업무까지 옮기면 lv6 을 넘습니다. 하위를 먼저 정리해 주세요");
    var oldPid = n.parent_id;
    n.parent_id = newPid;
    n.order = childrenOf(newPid).length;

    renumber(oldPid); renumber(newPid);

    childrenOf(id).forEach(function (c) { markDirty(c.id); });

  var _sorts = [];
  function endDrag(lv) {
    // 드래그 흔적을 확실히 지운다. 남으면 드롭존이 계속 보이고 _dragging 가드에 클릭이 막힌다.
    document.body.classList.remove("dragging", "dragL3", "dragL4", "dragL5", "dragL6");
    setTimeout(function () { _dragging = false; }, 0);
  }
  function wireDnD() {
    _sorts.forEach(function (s) { try { s.destroy(); } catch (e) {} });
    _sorts = [];
    endDrag();     // rerender 로 DOM 이 갈렸으므로 드래그 상태도 초기화
    if (typeof Sortable === "undefined" || S.viewMode !== "columns") return;
    var opt = { forceFallback: true, fallbackOnBody: true, fallbackTolerance: 3, animation: 140,
                ghostClass: "sgh", chosenClass: "sch", scroll: true, scrollSensitivity: 60, scrollSpeed: 12,
                // filter 로 걸러낸 요소(이름 input·삭제 버튼)는 preventDefault 하지 않는다 — 안 그러면
                // 이름칸을 눌러도 포커스·캐럿이 안 잡혀 편집을 시작할 수 없다.
                preventOnFilter: false };

    // (A) 컬럼 안 — 형제 순서 변경
    [].forEach.call(contentEl.querySelectorAll(".list[data-lv]"), function (el) {
      var lv = el.dataset.lv;
      _sorts.push(Sortable.create(el, Object.assign({}, opt, {
        group: { name: "L" + lv, pull: true, put: ["L" + lv] },
        draggable: ".card", filter: ".addbtn,.cdrop,.nm,.cdel",
        onStart: function () { _dragging = true; document.body.classList.add("dragging", "dragL" + lv); },
        onEnd: function (e) {
          endDrag();
          if (e.from !== e.to) return;                  // 드롭존 경유는 (B) 가 처리
          if (e.oldIndex === e.newIndex) return;
          var pid = e.from.dataset.parent;
          var ids = [].map.call(e.from.querySelectorAll(":scope > .card"), function (c) { return c.dataset.id; });
          // 다음 틱으로 미룬다 — 콜백 안에서 rerender 하면 wireDnD 가 드래그 중인
          // Sortable 을 파괴해 뒷정리가 끊긴다

      })));
    });

    // (B) 카드 안 드롭존 — 상위 바꾸기 (레벨은 유지)
    [].forEach.call(contentEl.querySelectorAll(".cdrop[data-parent]"), function (el) {
      var lv = Number(el.closest(".card").dataset.lv) + 1;
      _sorts.push(Sortable.create(el, Object.assign({}, opt, {
        group: { name: "L" + lv, pull: false, put: ["L" + lv] }, sort: false,
        // onAdd 는 Sortable 의 뒷정리(onEnd) 전에 불린다. 여기서 바로 rerender 하면
        // 드래그 중인 인스턴스가 파괴돼 onEnd 가 영영 안 오고, dragging 클래스와
        // _dragging 가드가 남아 앱 전체가 클릭 불능이 된다. 다음 틱으로 미룬다.
        onAdd: function (e) {
          var id = e.item.dataset.id, pid = el.dataset.parent;

          setTimeout(function () { actMove(id, pid); }, 0);
        },
      })));

  }

  function actToggle(id) { S.collapsed[id] = !S.collapsed[id]; rerender(); }
  function actCollapseAll() { var anyOpen = S.nodes.some(function (n) { return childrenOf(n.id).length && !S.collapsed[n.id]; }); if (anyOpen) { var c = {}; S.nodes.forEach(function (n) { if (childrenOf(n.id).length) c[n.id] = true; }); S.collapsed = c; } else S.collapsed = {}; rerender(); }
  /** 도메인 값 이름 변경. **칸을 벗어나거나 Enter 를 눌렀을 때(change) 한 번만** 불린다.
   *  글자마다(input) 부르면 "시"→"시운"→"시운전" 이 차례로 커밋되며 노드를 그때그때
   *  덮어써서, 오타를 고치려 지우고 다시 치는 순간 데이터가 망가진다. */
  function domRename(key, idx, val, refocus) {
    var old = S.domains[key][idx];
    val = String(val == null ? "" : val).trim();
    if (val === old) return;                      // 안 바뀌었으면 아무것도 안 한다

    // 빈 값은 거부하고 되돌린다 — 빈 도메인은 고를 수도, 셀 수도 없다
    if (!val) { flash("값은 비울 수 없습니다"); rerender(refocus); return; }
    // 다른 행과 겹치는 이름은 거부 — 같은 값이 두 줄이면 어느 쪽을 쓰는지 알 수 없다
    var dup = (S.domains[key] || []).some(function (v, i) { return i !== idx && v === val; });
    if (dup) { flash("'" + val + "' 은(는) 이미 목록에 있습니다"); rerender(refocus); return; }

    S.domains[key][idx] = val;
    // ★ old 가 비어 있으면 노드를 건드리지 않는다. `n[key] === ""` 는 그 필드를 안 채운
    //   모든 노드와 일치해서, 전 노드에 새 값이 박힌다(실제로 13개 노드가 오염됐다).
    if (old) {
      S.nodes.forEach(function (n) {
        if (key === "tech") n.tech = (n.tech || []).map(function (t) { return t === old ? val : t; });
        else if (n[key] === old) n[key] = val;
      });
    }
    markDirty("dom");
    rerender(refocus);
  }
  function domAdd(key) {
    var base = S.domains[key] || [], nm = "새 값", i = 2;
    while (base.indexOf(nm) >= 0) nm = "새 값 " + i++;   // 중복 없이 늘려간다
    S.domains[key] = base.concat([nm]); markDirty("dom"); rerender();
  }
  function domDelete(key, idx) { var v = S.domains[key][idx]; if (domUsage(key, v) > 0) { flash("사용 중이라 삭제할 수 없습니다"); return; } S.domains[key].splice(idx, 1); markDirty("dom"); rerender(); }

  function doSave() {
    // 개인 모드에는 서버가 없다 — [저장] 은 "제출 파일 내보내기"다.
    // 편집 자체는 markDirty 마다 localStorage 에 자동 저장되므로 눌러야 안 날아가는 게 아니다.
    if (SOLO) return soloExport();
    if (!S.author) { flash("작성자를 먼저 입력하세요"); return; }
    if (!S.dirty.length) { flash("변경 사항이 없습니다"); return; }
    emit({ type: "save", rev: S.rev, author: S.author, nodes: S.nodes, domains: S.domains });
  }
  // ── 개인 모드(!IN_ST) — 파이썬·서버 없이 파일 하나로 도는 배포판 ──────────
  // 편집은 localStorage 에 자동 저장되고, [내 파일 내보내기] 로 JSON 을 받아 관리자에게 준다.
  var LS_PREFIX = "pd_solo_v1:";
  function lsKey() {
    // 같은 PC 를 여러 명이 써도 섞이지 않게 신원을 키에 넣는다

  // 부서·이름을 먼저 지정했는가 — 일괄 반영(붙여넣기·가져오기·취합) 전에 요구한다(두 앱 공통).
  function identReady() { return !!S.dept && !!S.author; }
  function needIdent() {
    if (identReady()) return true;
    flash(SOLO ? "먼저 상단에 소속과 이름을 지정하세요" : "먼저 상단에 부서와 작성자를 지정하세요");
    return false;
  }
  function soloSave() {
    if (IN_ST) return;
    try {
      localStorage.setItem(lsKey(), JSON.stringify({
        nodes: S.nodes, domains: S.domains, dept: S.dept, author: S.author, ts: Date.now(),
      }));
      localStorage.setItem(LS_PREFIX + "last", lsKey());
    } catch (e) { /* 용량 초과 등 — 저장 실패해도 편집은 계속돼야 한다 */ }

      return (d && d.nodes && d.nodes.length) ? d : null;
    } catch (e) { return null; }
  }
  function soloExportName() {

    return "프로세스_" + (S.author || "이름") + "_" + (S.dept || "부서") + "_"

  }
  /** 내보내기 — 전 lv6 에 **소속만** 주입한다(카드마다 다시 묻지 않는 이유).

  function soloExport() {
    if (!S.dept || !S.author) { flash("상단에 소속과 이름을 먼저 입력하세요 (파일명 구분자)"); return; }
    var mine = S.nodes.map(function (n) {
