      + '<div class="tabs">' + tabs + "</div>" + toggle
      + '<div class="grow"></div>'
      // 개인에겐 "AI 적용률"보다 "얼마나 채웠나 / 내 업무가 연간 몇 시간인가"가 쓸모 있다
      + (SOLO
          // 단위가 다른 값을 한 숫자로 합치지 않는다 (연간 vs 호선당)
          ? '<div class="pill"><b>연간 ' + st.hours + ' 시간</b><span>세부업무 ' + st.detail + "개"
            + (st.perShipHours ? " · 호선당 " + st.perShipHours + "시간" : "")
            + (st.unresolved ? " · 호선루틴 " + st.unresolved + "건" : "")
            + (st.hoursMissing ? " · 미완성 " + st.hoursMissing + "개" : "") + "</span></div>"
          : '<div class="pill"><b>AI 적용률 ' + st.rate + '%</b><span>세부업무 ' + st.detail + "개 중 " + st.ai + "개</span></div>")
      + ident
      + (!SOLO && S.rev ? '<span class="revcap">rev ' + esc(S.rev) + "</span>" : "")
      + badge
      // v1 사이드바의 [↻ 디스크 다시 읽기] — 배너를 기다리지 않고 언제든 최신본을 받는다
      + (SOLO ? "" : '<button class="minibtn" data-act="reload" title="다른 사람이 저장한 최신 내용을 불러옵니다">↻ 다시 읽기</button>')
      + '<button class="save ' + (canSave ? "on" : "off") + '" data-act="save">'
      + (SOLO ? "⬇ 제출 파일 내보내기" : "💾 저장") + "</button>"
      + "</div>";
  }
  function banners() {
    var h = "";
    if (S.conflict) {
      h += '<div class="banner conf"><b>' + esc(maskName(S.conflict.disk_author) || "다른 사람") + "</b> 님이 먼저 저장했습니다 (rev " + esc(S.conflict.disk_rev) + "). 자동 병합은 하지 않습니다."
        + '<span class="grow"></span>'
        + '<button data-act="reload">최신 불러오기</button><button data-act="force">내 것으로 덮어쓰기</button><button data-act="dismiss">취소</button></div>';
    } else if (S.diskNewer) {
      h += '<div class="banner info"><b>' + esc(maskName(S.diskNewer.author) || "다른 사람") + "</b> 님이 방금 저장했습니다 (rev " + esc(S.diskNewer.rev) + ")."
        + '<span class="grow"></span><button data-act="reload">↻ 디스크 다시 읽기</button></div>';
    }
    return h;
  }

  function columns() {
    // lv3(부문)은 빵부스러기 드롭다운으로 고른다 — 컬럼은 lv4~lv6 만 (lv3 컬럼 제거).
    var html = '<div class="board scroll">';
    for (var lv = 4; lv <= 6; lv++) {
      var pid = S.sel[lv - 1];
      var enabled = !!pid;
      html += '<div class="col' + (lv > 4 ? " wide" : "") + (enabled ? "" : " off") + '"><div class="colhead"><span class="t">lv' + lv + " " + esc(LABELS[lv]) + '</span><span class="n">' + (enabled ? childrenOf(pid).length : 0) + "</span></div>"
        + '<div class="list scroll" data-lv="' + lv + '" data-parent="' + esc(pid || "") + '">';
      if (!enabled) html += '<div class="emptyhint">' + (lv === 4 ? "위에서 부문을<br/>먼저 고르세요" : "상위 항목을<br/>먼저 선택하세요") + "</div>";
      else {
        var cards = childrenOf(pid);
        cards.forEach(function (nn) { html += cardHTML(nn, lv); });
        html += '<button class="addbtn" data-act="add" data-pid="' + esc(pid) + '" data-lv="' + lv + '">＋ 새 ' + esc(LABELS[lv]) + "</button>";
      }
      html += "</div></div>";
    }
    return html + "</div>";
  }
  function cardHTML(nn, lv) {
    var detail = hasDetail(lv), chips = "";
    if (detail && nn.has_ai_agent) chips += '<span class="mc ai">AI</span>';
    if (detail) (nn.tech || []).slice(0, 2).forEach(function (t) { chips += '<span class="mc n">' + esc(t) + "</span>"; });
    if (detail && (nn.tech || []).length > 2) chips += '<span class="mc n">+' + ((nn.tech.length) - 2) + "</span>";
    if (detail && nn.dept) chips += '<span class="mc dept">' + esc(nn.dept) + "</span>";
    if (detail && nn.owner) chips += '<span class="mc n">' + esc(maskName(nn.owner)) + "</span>";
    // 취합 인원수 배지 — lv4~6 어디서나(메인앱 취합 산출물). SOLO 노드는 값이 없어 안 뜬다.
    var _sc = parseInt(nn.submit_count, 10);
    if (_sc >= 2) chips += '<span class="mc submit">👥 ' + _sc + "명</span>";
    // 개인 배포판 lv6 — 발생패턴·부하·자동화·선종을 카드에 요약해 세부 패널을 짧게 유지한다
    if (SOLO && detail) {
      var _p = occurOf(nn), _pl = { "상시루틴": "상시", "호선루틴": "호선R", "호선이벤트": "이벤트" }[_p] || _p;
      chips += '<span class="mc occ">' + esc(_pl) + "</span>";
      var _L = loadOf(nn);
      if (_L.kind === "annual" && _L.hours) chips += '<span class="mc load">연 ' + _L.hours + "h</span>";
      else if (_L.kind === "per_ship" && _L.hours) chips += '<span class="mc load">호선당 ' + _L.hours + "h</span>";
      else if (_L.kind === "unresolved") chips += '<span class="mc load">구간부하</span>';
      if (nn.automation_level) chips += '<span class="mc auto">' + esc(nn.automation_level) + "</span>";
      var _st = shipTypesOf(nn.id);
      if (_st.length) chips += '<span class="mc ship">' + esc(_st.map(function (s) { return SHIP_TYPE_LABEL[s] || s; }).join("·")) + "</span>";
    }
    var kids = childrenOf(nn.id).length;
    if (kids) chips += '<span class="mc kids">▸' + kids + "</span>";
    var sel = S.selectedId === nn.id;
    // 현재 선택 체인 위의 조상 카드는 옅게 강조(.path) — "지금 어느 경로를 쓰는지" 한눈에 보이게.
    var onPath = !sel && S.sel[lv] === nn.id;
    // lv6 아래는 없으므로 드롭존도 없다. 드롭존은 자기보다 한 단계 아래 레벨만 받는다.
    var drop = lv < 6 ? '<div class="cdrop acc' + (lv + 1) + '" data-parent="' + esc(nn.id) + '"></div>' : "";
    return '<div class="card' + (sel ? " sel" : onPath ? " path" : "") + (isHit(nn) ? " hit" : "") + '" data-act="select" data-id="' + esc(nn.id) + '" data-lv="' + lv + '">'
      // 이름은 카드에서 바로 편집(인라인 input), 삭제도 카드에서 바로. 둘 다 드래그/선택으로 새지 않게 처리.
      + '<div class="top1"><input class="nm" data-fkey="name" data-id="' + esc(nn.id) + '" value="' + esc(nn.name) + '" placeholder="' + esc(LABELS[lv]) + '명" />'
      + (S.dirty.indexOf(nn.id) >= 0 ? '<span class="dot" title="저장 안 됨"></span>' : "")
      + '<button class="cdel" data-act="del" data-id="' + esc(nn.id) + '" title="이 ' + esc(LABELS[lv]) + ' 삭제' + (kids ? " (하위 " + descCount(nn.id) + "개 포함)" : "") + '">🗑</button></div>'
      + (nn.desc ? '<div class="cdesc">' + esc(nn.desc) + "</div>" : "")
      + (chips ? '<div class="meta">' + chips + "</div>" : "")
      + drop
      + "</div>";
  }

  function outline() {
    var anyOpen = S.nodes.some(function (n) { return childrenOf(n.id).length && !S.collapsed[n.id]; });
    var body = "";
    (function walk(pid, depth) {
      childrenOf(pid).forEach(function (nn) {
        var kids = childrenOf(nn.id), col = !!S.collapsed[nn.id], sel = S.selectedId === nn.id, detail = hasDetail(nn.level);
        var chips = "";
        if (detail && nn.has_ai_agent) chips += '<span class="mc ai">AI</span>';
        if (detail && nn.dept) chips += '<span class="mc dept">' + esc(nn.dept) + "</span>";
        if (detail && nn.owner) chips += '<span class="mc n">' + esc(maskName(nn.owner)) + "</span>";
        if (kids.length) chips += '<span class="mc kids">▸' + kids.length + "</span>";
        body += '<div class="row' + (sel ? " sel" : "") + (isHit(nn) ? " hit" : "") + '" style="padding-left:' + (depth * 20) + 'px">'
          + '<div class="tog"' + (kids.length ? ' data-act="toggle" data-id="' + esc(nn.id) + '" style="cursor:pointer"' : "") + ">" + (kids.length ? (col ? "▸" : "▾") : "") + "</div>"
          + '<div class="rowmain" data-act="select" data-id="' + esc(nn.id) + '"><span class="lvb ' + (detail ? "d" : "g") + '">lv' + nn.level + "</span>"
          + '<input class="rowname" data-fkey="name" data-id="' + esc(nn.id) + '" value="' + esc(nn.name) + '" placeholder="' + esc(LABELS[nn.level]) + '명" />'
          + (nn.desc ? '<span class="rowdesc">' + esc(nn.desc) + "</span>" : "") + chips
          + (S.dirty.indexOf(nn.id) >= 0 ? '<span class="dot"></span>' : "") + "</div>"
          + (nn.level < 6 ? '<button class="rowadd" data-act="add" data-pid="' + esc(nn.id) + '" data-lv="' + (nn.level + 1) + '" title="하위 추가">＋</button>' : "")
          + '<button class="rowdel" data-act="del" data-id="' + esc(nn.id) + '" title="이 ' + esc(LABELS[nn.level]) + ' 삭제' + (kids.length ? " (하위 " + descCount(nn.id) + "개 포함)" : "") + '">🗑</button>'
          + "</div>";
        if (!col) walk(nn.id, depth + 1);
      });
    })(ROOT, 0);
    return '<div class="outwrap"><div class="outcard"><div class="outhead"><span class="h1">업무 계층 전체보기</span><span class="h2">클릭하면 오른쪽에서 상세 입력</span><div class="grow"></div>'
      + '<button class="minibtn" data-act="collapse">' + (anyOpen ? "모두 접기" : "모두 펼치기") + "</button>"
      + '<button class="minibtn p" data-act="add" data-pid="' + ROOT + '" data-lv="3">＋ 새 부문</button></div>'
      + '<div class="list scroll" style="padding:7px">' + body + "</div></div></div>";
  }

  // 검색어와 이름이 겹치는지 (하이라이트용). 빈 검색어는 아무것도 맞히지 않는다.
  function isHit(nn) {
    var q = (S.query || "").trim().toLowerCase();
    return !!q && String(nn.name || "").toLowerCase().indexOf(q) >= 0;
  }
  function hitCount() {
    var q = (S.query || "").trim(); if (!q) return 0;
    return S.nodes.filter(isHit).length;
  }

  function crumbBar() {
    var chips = FIXED.map(function (f) { return '<span class="chip fix">🔒 ' + esc(f) + "</span><span class=\"sep\">›</span>"; }).join("");
    // lv3(부문)은 드롭다운으로 고른다 — 경로 전체를 늘어놓지 않고 여기서 바로 부문 전환.
    // lv4~lv6 위치는 컬럼의 조상 카드 하이라이트(.path)로 표시하므로 여기 칩으로 붙이지 않는다.
    var lv3s = childrenOf(ROOT), cur3 = S.sel[3] || "";
    var lv3sel = '<select class="crumbsel" data-fkey="crumblv3"><option value="">부문 선택 —</option>'
      + lv3s.map(function (n) { return '<option value="' + esc(n.id) + '"' + (n.id === cur3 ? " selected" : "") + ">" + esc(n.name || "(이름 없음)") + "</option>"; }).join("")
      + "</select>";
    // 부문은 추가/삭제만 — 컬럼 대신 드롭다운 옆 버튼으로. 삭제는 부문이 선택됐을 때만.
    var lv3btns = '<button class="crumbbtn add" data-act="add" data-pid="' + ROOT + '" data-lv="3" title="새 부문 추가">＋ 부문</button>'
      + (cur3 ? '<button class="crumbbtn del" data-act="del" data-id="' + esc(cur3) + '" title="이 부문 삭제">🗑</button>' : "");
    var q = (S.query || "").trim();
    var search = '<div class="searchbox"><input data-fkey="query" value="' + esc(S.query || "") + '" placeholder="🔎 업무명 검색" />'
      + (q ? '<span class="shits">' + hitCount() + "건</span>" : "") + "</div>";
    return '<div class="crumb">' + chips + lv3sel + lv3btns + '<div class="grow"></div>' + search + "</div>";
  }

  /** 복수 선택 칩. 기존 활용기술 칩(.tchip)과 같은 모양·같은 토글 방식을 쓴다. */
  function chipRow(id, key, opts, sel, label) {
    sel = sel || [];
    var chips = opts.map(function (o) {
      var v = typeof o === "string" ? o : o.v, t = typeof o === "string" ? o : o.t;
      var on = sel.indexOf(v) >= 0;
      return '<button class="tchip' + (on ? " on" : "") + '" data-act="mchip" data-id="' + esc(id)
        + '" data-k="' + esc(key) + '" data-v="' + esc(v) + '">' + esc(t) + "</button>";
    }).join("");
    return '<div><div class="fl">' + label + '</div><div class="techrow">' + chips + "</div></div>";
  }

  /** 기간 단위 단일 선택 칩(택1). 칩 모양은 활용기술과 같되 한 번에 하나만 켜진다. */
  function freqUnitChips(id, sel) {
    var chips = FREQ_UNIT_KEYS.map(function (u) {
      var on = (sel === u);
      return '<button class="tchip' + (on ? " on" : "") + '" data-act="freqchip" data-id="' + esc(id)
        + '" data-v="' + esc(u) + '">' + esc(u) + "</button>";
    }).join("");
    return '<div><div class="fl">기간 단위 <span style="color:#a8a29e;font-weight:600">· 택1</span></div><div class="techrow">' + chips + "</div></div>";
  }

  /** lv6 발생 패턴 블록 — 패턴에 따라 필요한 필드만 보여준다.
   *  세 패턴이 요구하는 값이 서로 달라서, 다 늘어놓으면 작성자가 뭘 채워야 할지 모른다. */
  function occurBlock(n, id) {
    var p = occurOf(n);
    var pat = OCCUR_PATTERNS.map(function (t) {
      return '<button class="tchip' + (p === t ? " on" : "") + '" data-act="occur" data-id="' + esc(id)
        + '" data-v="' + esc(t) + '">' + esc(t) + "</button>";
    }).join("");
    var HINT = {};
    HINT[OCCUR.ROUTINE] = "호선과 상관없이 늘 하는 업무";
    HINT[OCCUR.SHIP_ROUTINE] = "호선 도는 동안 반복하는 업무";
    HINT[OCCUR.SHIP_EVENT] = "특정 시점에만 하는 업무";
    var h = '<div style="margin-top:8px;padding-top:14px;border-top:1px dashed #e7e1d6">'
      + '<div class="fl">언제 하는 업무인가요 <span style="color:#a8a29e;font-weight:600">· '
      + esc(HINT[p] || "") + '</span></div><div class="techrow">' + pat + "</div></div>";

    // 1회 소요시간은 세 패턴 공통 — 부하의 원자 단위
    var whCell = '<div><div class="fl">1회 소요시간 <span style="color:#a8a29e;font-weight:600">· 시간 (30분=0.5)</span></div>'
      + '<input class="fi" style="font-size:14.5px;padding:8px 10px" data-fkey="work_hours" data-id="' + esc(id) + '" value="' + esc(n.work_hours) + '" placeholder="예: 2" /></div>';

    if (p === OCCUR.SHIP_EVENT) {
      h += '<div style="margin-top:10px">' + whCell + "</div>";   // 소요시간만 (시점은 아래 목록)
      // 시점을 여러 개 지정한다. 줄 수가 곧 호선당 횟수 (GT-7, AC-7 → 2줄 = 2회).
      var evs = n.events || [];
      var evStyle = 'display:flex;gap:6px;align-items:center;margin-top:6px';
      var rows = evs.map(function (ev, i) {
        return '<div style="' + evStyle + '">'
          + '<select class="fs" style="flex:1.4;font-size:14px;padding:7px 8px" data-fkey="ev_event" data-id="' + esc(id) + '" data-idx="' + i + '">'
          + '<option value="">기준 시점 —</option>'
          + MILESTONE_EVENTS.map(function (e) { return '<option value="' + esc(e) + '"' + (ev.event === e ? " selected" : "") + ">" + esc(e) + "</option>"; }).join("")
          + "</select>"
          + '<input class="fi" style="flex:1;font-size:14px;padding:7px 8px" data-fkey="ev_offset_start" data-id="' + esc(id) + '" data-idx="' + i + '" value="' + esc(ev.offset_start) + '" placeholder="±일 예:-7" />'
          + '<input class="fi" style="flex:1;font-size:14px;padding:7px 8px" data-fkey="ev_offset_days" data-id="' + esc(id) + '" data-idx="' + i + '" value="' + esc(ev.offset_days) + '" placeholder="며칠 예:1" />'
          + '<button data-act="evdel" data-id="' + esc(id) + '" data-idx="' + i + '" title="삭제" style="flex:none;border:1px solid #e7e1d6;background:#faf8f4;color:#b91c1c;border-radius:7px;width:30px;height:30px;cursor:pointer;font-size:15px">✕</button>'
          + "</div>";
      }).join("");
      h += '<div style="margin-top:10px"><div class="fl">발생 시점 <span style="color:#a8a29e;font-weight:600">· 마일스톤 기준 ±일. 여러 번이면 줄 추가 (줄 수 = 호선당 횟수)</span></div>'
        + (rows || '<div class="solohint" style="padding:6px 0">아직 시점이 없습니다. 아래 버튼으로 추가하세요.</div>')
        + '<button data-act="evadd" data-id="' + esc(id) + '" style="margin-top:8px;font-size:14px;padding:7px 12px;border:1px dashed #14b8a6;background:#f0fdfa;color:#0f766e;border-radius:8px;cursor:pointer;font-weight:700">＋ 시점 추가</button></div>';
    } else {
      // 상시·호선루틴 공통 — 기간 단위는 칩(택1) 한 줄, 그 아래 소요시간·횟수(grid2). 나눠야 "주 3회" 표현
      h += '<div style="margin-top:10px">' + freqUnitChips(id, n.freq_unit) + "</div>"
        + '<div class="grid2" style="margin-top:8px">' + whCell
        + '<div><div class="fl">횟수 <span style="color:#a8a29e;font-weight:600">· 단위당</span></div>'
        + '<input class="fi" style="font-size:14.5px;padding:8px 10px" data-fkey="freq_count" data-id="' + esc(id) + '" value="' + esc(n.freq_count) + '" placeholder="예: 3" /></div>'
        + "</div>";
      if (p === OCCUR.SHIP_ROUTINE) {
        h += chipRow(id, "apply_phases", TRIAL_PHASES, n.apply_phases,
                     '반복 구간 <span style="color:#a8a29e;font-weight:600">· 여러 개 선택 가능</span>');
      }
    }

    // 선종 — 호선 패턴(호선루틴·호선이벤트)에서만. 부하 계산이 "호선.선종 ∈ 업무.선종" 으로
    // 조인하는 적용 필터다. 상시루틴은 호선 무관이라 선종이 없다. (예전 work_type 게이트 폐지)
    if (p === OCCUR.SHIP_ROUTINE || p === OCCUR.SHIP_EVENT) {
      h += chipRow(id, "ship_types", SHIP_TYPES.map(function (s) { return { v: s, t: SHIP_TYPE_LABEL[s] + " " + s }; }),
                   n.ship_types, '적용 선종 <span style="color:#a8a29e;font-weight:600">· 여러 개 선택. 비우면 전 선종</span>');
    }

    // 부하 수치는 왼쪽 카드 배지로 옮겼다 (패널 스크롤 축소).
    // 여기선 아직 못 채운 경우에만 한 줄로 안내한다.
    var L = loadOf(n);
    if (L.kind === "annual" && !L.hours)
      h += '<div class="solohint" style="padding-top:8px">기간단위·횟수·소요시간을 채우면 왼쪽 카드에 <b>연간 부하</b>가 표시됩니다.</div>';
    else if (L.kind === "per_ship" && !L.hours)
      h += '<div class="solohint" style="padding-top:8px">소요시간과 발생 시점을 채우면 왼쪽 카드에 <b>호선당 부하</b>가 표시됩니다.</div>';
    else if (L.kind === "unresolved")
      h += '<div class="solohint" style="padding-top:8px">구간 길이는 나중에 호선 일정으로 산출합니다. 카드엔 <b>구간부하</b>로 표시됩니다.</div>';
    return h;
  }


  function panel() {
    if (!S.selectedId) {
      return '<div class="panel"><div class="pempty"><div style="font-size:34px">👈</div><div style="font-size:15px;font-weight:700;color:#57534e">카드를 선택하면 여기서 편집합니다</div><div style="font-size:13.5px;color:#a8a29e;line-height:1.6">각 컬럼의 <b>＋</b> 로 새 업무를 추가하고,<br/>내용은 입력 즉시 반영됩니다. 마치면 상단 <b>저장</b>.</div></div></div>';
    }
    var n = byId(S.selectedId); if (!n) return '<div class="panel"></div>';
    var detail = hasDetail(n.level), lv = n.level, id = n.id;
    var dirty = S.dirty.indexOf(id) >= 0;
    // 웹(메인앱): 선택한 세부업무의 부서/과를 헤드에 크게 표시 — 작성 중 "어느 부서 업무인지" 바로 보이게
    var deptChip = (!SOLO && detail)
      ? '<span class="pdept' + (n.dept ? "" : " none") + '">🏢 ' + esc(n.dept || "부서 미지정") + "</span>"
      : "";
    var head = '<div class="phead ' + (detail ? "d" : "g") + '"><div class="prow"><span class="ptag">지금 편집 중</span>'
      + '<span class="plv ' + (detail ? "d" : "g") + '">lv' + lv + " · " + esc(LABELS[lv]) + "</span>"
      + deptChip
      + (dirty ? '<span class="punsaved">● 미저장</span>' : "") + "</div>"
      + '<div style="margin-top:8px;display:flex;align-items:flex-start;gap:10px"><div class="pname" style="flex:1;margin:0">' + esc(n.name || "(이름 없음)") + '</div><button class="delbtn" style="flex:none;font-size:13px;padding:6px 10px;white-space:nowrap" data-act="del" data-id="' + esc(id) + '">🗑 삭제 ' + (descCount(id) > 1 ? "(하위 " + (descCount(id) - 1) + "개 포함)" : "") + '</button></div>'
      + '<div class="ppath">' + esc(pathNames(id).join("  ›  ")) + "</div></div>";

    // 상단 전폭: 이름 + 설명 (2열)
    var fields = '<div class="grid2" style="align-items:start">'
      + '<div><div class="fl">' + esc(LABELS[lv]) + '명</div><input class="fi" data-fkey="name" data-id="' + esc(id) + '" value="' + esc(n.name) + '" placeholder="이름을 입력하세요" /></div>'
      + '<div><div class="fl">설명</div><textarea class="fa" data-fkey="desc" data-id="' + esc(id) + '" placeholder="이 업무가 무엇인지 간단히">' + esc(n.desc) + "</textarea></div>"
      + "</div>";

    if (!detail) {
      var hidden = ["dept", "owner", "outputs", "linked_system", "linked_system_detail", "automation_level", "freq_unit", "freq_count"].some(function (k) { return n[k]; }) || n.has_ai_agent || (n.tech || []).length;
      fields += '<div class="note">📁 ' + esc(josa(LABELS[lv])) + ' 업무를 묶는 분류입니다.<br/>AI 에이전트·담당자 같은 세부 정보는 <b style="color:#0f766e">lv6 세부업무</b>에서 입력합니다.</div>';
      if (hidden) fields += '<div class="warn">💾 이전에 입력한 세부 정보가 보존되어 있습니다. lv6으로 옮기면 다시 나타납니다.</div>';
    } else {
      var opt = function (key, cur) { var base = (S.domains[key] || []).slice(); if (cur && base.indexOf(cur) < 0) base.push(cur); return '<option value="">— 선택 —</option>' + base.map(function (v) { return '<option value="' + esc(v) + '"' + (v === cur ? " selected" : "") + ">" + esc(v) + "</option>"; }).join(""); };
      var techChips = (S.domains.tech || []).map(function (t) { var on = (n.tech || []).indexOf(t) >= 0; return '<button class="tchip' + (on ? " on" : "") + '" data-act="tech" data-id="' + esc(id) + '" data-t="' + esc(t) + '">' + esc(t) + "</button>"; }).join("");
      var aiOn = n.has_ai_agent;
      // AI 에이전트 토글 + 자동화 수준 — 한 줄. AI 는 aicard 스타일을 콤팩트하게 재사용.
      var aiAutoRow = '<div class="grid2">'
        + '<div><div class="fl">AI 에이전트 <span style="color:#a8a29e;font-weight:600">· 적용 시 집계</span></div>'
        +   '<label class="aicard ' + (aiOn ? "on" : "") + '" style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0;padding:9px 12px">'
        +   '<input type="checkbox" data-fkey="ai" data-id="' + esc(id) + '"' + (aiOn ? " checked" : "") + ' style="width:15px;height:15px" />'
        +   '<span class="ait" style="color:' + (aiOn ? "#166534" : "#334155") + '">🤖 ' + (aiOn ? "적용됨" : "적용") + "</span></label></div>"
        + '<div><div class="fl">자동화 수준</div><select class="fs" data-fkey="automation_level" data-id="' + esc(id) + '">' + opt("automation_level", n.automation_level) + "</select></div>"
        + "</div>";
      // 개인 모드는 상단에 소속·이름을 이미 받았다 — 카드마다 또 묻지 않고 내보낼 때 채운다
      var nonSolo = SOLO ? "" :
             '<div class="grid2">'
           + '<div><div class="fl">부서/과</div><select class="fs" data-fkey="dept" data-id="' + esc(id) + '">' + deptOptions(n.dept) + "</select></div>"
           + '<div><div class="fl">담당자</div><input class="fi" style="font-size:14.5px;padding:8px 10px" data-fkey="owner" data-id="' + esc(id) + '" value="' + esc(n.owner) + '" placeholder="이름" /></div>'
           + "</div>"
           // 수행 주기 = 기간 단위 칩(택1) + 횟수. 연간 횟수는 횟수×단위연간수로 파생하므로 별도 입력칸 없음
           + '<div style="margin-top:9px">' + freqUnitChips(id, n.freq_unit) + "</div>"
           + '<div class="grid2" style="margin-top:8px">'
           + '<div><div class="fl">1회 소요시간 <span style="color:#a8a29e;font-weight:600">· 시간 (30분=0.5)</span></div>'
           + '<input class="fi" style="font-size:14.5px;padding:8px 10px" data-fkey="work_hours" data-id="' + esc(id) + '" value="' + esc(n.work_hours) + '" placeholder="예: 2" /></div>'
           + '<div><div class="fl">횟수 <span style="color:#a8a29e;font-weight:600">· 단위당</span></div>'
           + '<input class="fi" style="font-size:14.5px;padding:8px 10px" data-fkey="freq_count" data-id="' + esc(id) + '" value="' + esc(n.freq_count) + '" placeholder="예: 3" /></div>'
           + "</div>";
      var occ = SOLO ? occurBlock(n, id)
                     : '<div class="mh">연간 공수 <b>' + (annualHours(n) ? annualHours(n) + " 시간" : "—") + "</b>"
                       + '<span>1회 소요시간 × (횟수 × 단위 연간수)</span></div>';
      var techBlock = '<div><div class="fl">활용 기술 <span style="color:#a8a29e;font-weight:600">· 눌러서 선택</span></div><div class="techrow">' + techChips + "</div>"
        // 도메인 탭까지 가지 않고 여기서 바로 새 기술을 만든다 (v1 "목록에 없는 기술 추가")
        + '<input class="fi" style="font-size:14px;padding:7px 9px;margin-top:7px" data-fkey="newtech" data-id="' + esc(id) + '" value="" placeholder="목록에 없는 기술 추가 — 입력 후 Enter (쉼표로 여러 개)" /></div>';
      var outputsBlock = '<div><div class="fl">산출물</div><input class="fi" style="font-size:14.5px" data-fkey="outputs" data-id="' + esc(id) + '" value="' + esc(n.outputs) + '" placeholder="예: 시운전 결과보고서" /></div>';
      var linkedBlock = '<div class="grid2">'
        + '<div><div class="fl">연계 시스템</div><select class="fs" data-fkey="linked_system" data-id="' + esc(id) + '">' + opt("linked_system", n.linked_system) + "</select></div>"
        + '<div><div class="fl">추가 정보 <span style="color:#a8a29e;font-weight:600">· 모듈·인터페이스 등</span></div>'
        + '<input class="fi" style="font-size:14.5px;padding:8px 10px" data-fkey="linked_system_detail" data-id="' + esc(id) + '" value="' + esc(n.linked_system_detail) + '" placeholder="예: MM모듈" /></div>'
        + "</div>";
      // 2열: 왼쪽 = 발생/부하(+비SOLO 필드), 오른쪽 = AI·자동화 / 기술 / 산출물 / 연계
      fields += '<div class="pgrid">'
        + '<div class="pcol">' + nonSolo + occ + "</div>"
        + '<div class="pcol">' + aiAutoRow + techBlock + outputsBlock + linkedBlock + "</div>"
        + "</div>";
      // 취합 상세 — 여러 제출을 합칠 때 채워지는 읽기전용 요약(부서 기준, 이름 없음). 메인앱 전용.
      if (!SOLO && n.submit_detail) {
        fields += '<div style="margin-top:12px"><div class="fl">🧩 취합 상세 <span style="color:#a8a29e;font-weight:600">· 제출 '
          + esc(n.submit_count || "") + '명 (부서별)</span></div>'
          + '<div class="cardbox" style="padding:10px 12px;font-size:13.5px;color:#57534e;line-height:1.7;white-space:pre-wrap">'
          + esc(n.submit_detail) + "</div></div>";
      }
    }

    // 상위 업무 바꾸기 — 드래그로 불가능한 레벨 변경(승격/강등)의 유일한 경로
    var tg = moveTargets(id), kids = descCount(id);
    fields += '<div style="margin-top:6px;padding-top:14px;border-top:1px dashed #e7e1d6">'
      + '<div class="fl">상위 업무 바꾸기 <span style="color:#a8a29e;font-weight:600">· 레벨도 함께 바뀝니다</span></div>'
      + '<select class="fs" data-fkey="moveto" data-id="' + esc(id) + '">'
      + tg.map(function (t) { return '<option value="' + esc(t.id) + '"' + (t.id === n.parent_id ? " selected" : "") + ">" + esc(t.label) + "</option>"; }).join("")
      + "</select>"
      + (kids ? '<div style="font-size:13.5px;color:#a8a29e;margin-top:5px">하위 업무 ' + kids + "개도 함께 이동하며 레벨이 다시 매겨집니다.</div>" : "")
      + "</div>";

    return '<div class="panel">' + head + '<div class="pbody scroll">' + fields + "</div></div>";
  }

  function pageDomain() {
    // '수행 주기'는 두 앱 모두 기간단위 칩+횟수로 대체했으므로 도메인 목록에서 감춘다 (안 쓰는 도메인).
    var keys = ["dept", "tech", "automation_level", "linked_system"];
    if (keys.indexOf(S.domTab) < 0) S.domTab = keys[0];   // 숨긴 탭이 선택돼 있으면 첫 탭으로
    var tabs = keys.map(function (k) { return '<button class="stab' + (S.domTab === k ? " on" : "") + '" data-act="domtab" data-k="' + k + '">' + esc(DL[k]) + ' <span style="opacity:.55">' + (S.domains[k] || []).length + "</span></button>"; }).join("");
    var dk = S.domTab;
    // 사용 수 표시는 개인 배포판에선 숨긴다(부서가 늘 0이라 혼란) — 삭제 잠금 계산은 유지.
    function drow(v, i) { var u = domUsage(dk, v), del = u > 0; return '<div class="drow"><input class="dinput" data-fkey="dom" data-k="' + dk + '" data-i="' + i + '" value="' + esc(v) + '" />' + (SOLO ? "<span></span>" : '<span class="use ' + (u > 0 ? "y" : "n") + '">' + u + "개 업무</span>") + '<button class="delbtn" style="' + (del ? "color:#cabfb0;border-color:#e7e1d6;cursor:not-allowed" : "") + '" data-act="domdel" data-k="' + dk + '" data-i="' + i + '">삭제</button></div>'; }
    var rows;
    if (dk === "dept") {
      // 부서/과는 과 목록을 **부서별 그룹 소제목**으로 묶어 보여준다(값·index 는 그대로).
      var groups = {}, order = [];
      (S.domains.dept || []).forEach(function (v, i) { var b = deptParent(v); if (!groups[b]) { groups[b] = []; order.push(b); } groups[b].push([v, i]); });
      rows = order.map(function (b) {
        return '<div style="padding:9px 16px 5px;font-size:13px;font-weight:800;color:#0f766e;background:#f7fdfc;border-bottom:1px solid #eef4f2">🏢 ' + esc(b) + "</div>"
          + groups[b].map(function (p) { return drow(p[0], p[1]); }).join("");
      }).join("");
    } else {
      rows = (S.domains[dk] || []).map(drow).join("");
    }
    return '<div class="page scroll"><div class="pw"><div class="h1">도메인 관리</div><div class="sub">카드 상세에서 고르는 선택 목록입니다. 값 이름을 바꾸면 그 값을 쓰는 업무도 함께 바뀝니다. 사용 중인 값은 삭제할 수 없습니다.</div>'
      + '<div class="subtabs">' + tabs + "</div>"
      + '<div class="cardbox"><div class="dhead"><span>값</span>' + (SOLO ? "<span></span>" : "<span>사용 중</span>") + '<span></span></div>' + rows
      + '<div style="padding:13px 16px"><button class="dadd" data-act="domadd" data-k="' + dk + '">＋ 값 추가</button></div></div>'
      + '<div style="font-size:13.5px;color:#a8a29e;margin-top:12px">값을 고친 뒤 <b>칸을 벗어나면</b> 반영됩니다. '
      + (SOLO ? '제출하려면 상단 <b>⬇ 제출 파일 내보내기</b> 를 누르세요.'
              : '파일에 기록하려면 상단 <b>저장</b> 을 누르세요.') + "</div></div></div>";
  }

  // 엑셀 가져오기 — 파일 선택 → 파이썬이 파싱/미리보기 → 확인 → 반영 (2단계).
  // 확인 없이 반영하면 되돌릴 방법이 [디스크 다시 읽기] 뿐이라 위험하다.
  function importPane() {
    var errs = S.importErrors || [];
    if (errs.length) {
      return '<div class="cardbox" style="padding:22px">'
        + '<div class="warn" style="margin-bottom:12px">⚠ 엑셀에 문제가 있습니다. 고친 뒤 다시 올려주세요.</div>'
        + '<div style="max-height:220px;overflow:auto;font-size:14px;color:#78716c;line-height:1.9">'
        + errs.map(function (e) { return "· " + esc(e); }).join("<br/>") + "</div>"
        + '<div style="margin-top:16px"><button class="secondary" data-act="impcancel">다른 파일 올리기</button></div></div>';
    }

    var p = S.importPreview;
    if (!p) {
      return '<div class="cardbox" style="padding:22px">'
        + (identReady() ? "" : '<div class="warn" style="margin-bottom:14px">⚠ 먼저 상단에 <b>부서</b>와 <b>작성자</b>를 지정하세요. 지정 전에는 일괄 반영이 되지 않습니다.</div>')
        + '<label class="drop" for="xlsxup"><div style="font-size:26px">⬆</div><div style="font-size:15px;font-weight:700;color:#57534e;margin-top:6px">엑셀(.xlsx) 또는 개인 제출 파일(.json)을 올리세요</div><div style="font-size:13.5px;color:#a8a29e;margin-top:3px">내보내기 탭에서 받은 엑셀, 또는 개인 배포판이 내보낸 JSON</div></label>'
        + '<input id="xlsxup" type="file" accept=".xlsx,.json" style="display:none" data-fkey="xlsxfile" />'
        + '<div style="margin-top:18px;font-size:14px;font-weight:800;color:#57534e">엑셀 작성 규칙</div><ul style="margin:8px 0 0;padding-left:18px;font-size:14px;color:#78716c;line-height:1.9">'
        + "<li>lv3~lv6 칸을 <b>왼쪽부터 연속으로</b> 채웁니다. (lv4 를 비우고 lv5 만 채우면 오류)</li>"
        + "<li>상위 업무는 자기 행이 반드시 있어야 합니다.</li>"
        + '<li><code style="background:#f0ede6;padding:1px 5px;border-radius:4px">id</code> 가 비어 있으면 새 업무로 등록됩니다. 기존 업무는 id 를 지우지 마세요.</li>'
        + "<li>AI·기술·부서 같은 세부 정보는 <b>lv6 세부업무</b> 행에만 채웁니다.</li>"
        + "<li>엑셀에서 행을 지워도 <b>기본은 삭제되지 않습니다</b> (반영 전 확인 화면에서 선택).</li>"
        + "<li>담당자가 마스킹된 값(<b>홍*동</b>)이면 원본 이름을 덮어쓰지 않습니다.</li></ul></div>";
    }

    function list(title, rows, color) {
      if (!rows || !rows.length) return "";
      return '<div style="margin-top:12px"><div style="font-size:14px;font-weight:800;color:' + color + ';margin-bottom:6px">' + title + "</div>"
        + '<div class="cardbox" style="max-height:140px;overflow:auto">'
        + rows.map(function (r) { return '<div style="padding:6px 12px;border-bottom:1px solid #f7f4ee;font-size:14px"><span class="lvb g">lv' + esc(r.level) + "</span> " + esc(r.path) + "</div>"; }).join("")
        + "</div></div>";
    }
    var cells = [["추가", p.added, "#166534", "#dcfce7"], ["변경", p.changed, "#92400e", "#fef3c7"], ["삭제", p.removed, "#b91c1c", "#fee2e2"]]
      .map(function (d) { return '<div class="diff" style="background:' + d[3] + '"><div class="dv" style="color:' + d[2] + '">' + esc(d[1]) + '</div><div class="dl" style="color:' + d[2] + '">' + d[0] + "</div></div>"; }).join("");

    var unknown = p.unknown || {}, ukeys = Object.keys(unknown);
    var unknownBox = "";
    if (ukeys.length) {
      unknownBox = '<div class="warn" style="margin-top:14px">도메인 목록에 없는 값이 있습니다 — '
        + ukeys.map(function (k) { return esc((p.labels || {})[k] || k) + ": " + esc(unknown[k].join(", ")); }).join(" / ") + "</div>"
        + '<label style="display:flex;align-items:center;gap:9px;margin-top:10px;cursor:pointer"><input type="checkbox" data-fkey="adddomains"' + (S.addDomains ? " checked" : "") + ' style="width:16px;height:16px;accent-color:#0f766e" /><span style="font-size:14.5px;color:#44403c">이 값들을 도메인 목록에 추가</span></label>';
    }
    var delBox = '<label style="display:flex;align-items:center;gap:9px;margin-top:14px;cursor:' + (p.removed ? "pointer" : "not-allowed") + ';opacity:' + (p.removed ? "1" : ".5") + '">'
      + '<input type="checkbox" data-fkey="delmissing"' + (S.delMissing ? " checked" : "") + (p.removed ? "" : " disabled")
      + ' style="width:16px;height:16px;accent-color:#b91c1c" /><span style="font-size:14.5px;color:#44403c">엑셀에 없는 업무 '
      + esc(p.removed) + "개를 삭제합니다</span></label>"
      + '<div style="font-size:13.5px;color:#a8a29e;margin-top:4px;padding-left:25px">기본은 삭제하지 않습니다. 엑셀에서 행을 지운 것이 실수일 수 있습니다.</div>';

    var nothing = !p.added && !p.changed && !p.removed;
    return '<div class="cardbox" style="padding:22px">'
      + '<div style="font-size:15px;font-weight:800;color:#0f766e;margin-bottom:4px">반영 전 확인</div>'
      + (p.filename ? '<div style="font-size:13px;color:#78716c;margin-bottom:12px">📄 <b>' + esc(p.filename) + "</b></div>" : '<div style="margin-bottom:8px"></div>')
      + (nothing ? '<div style="font-size:14.5px;color:#78716c">현재 데이터와 차이가 없습니다.</div>' : '<div class="diffgrid">' + cells + "</div>")
      + list("추가될 업무 " + p.added + "개", p.added_list, "#166534")
      + list("변경될 업무 " + p.changed + "개", p.changed_list, "#92400e")
      + list("삭제될 업무 " + p.removed + "개", p.removed_list, "#b91c1c")
      + delBox + unknownBox
      + '<div style="display:flex;gap:8px;margin-top:20px"><button class="secondary" data-act="impcancel">취소</button>'
      + '<button class="primary" data-act="impapply">이 내용으로 반영</button></div>'
      + '<div style="font-size:13.5px;color:#a8a29e;margin-top:10px">반영 후 상단 [저장] 을 눌러야 파일에 기록됩니다.</div></div>';
  }

  /** 제출 취합 — 여러 개인 제출 JSON 을 폴더 스캔/다중 업로드로 모아 경로 기준 병합 + 제출 인원수 집계.
   *  파싱·집계는 파이썬(collect_jsons)이 하고 여기선 결과(collect_preview)만 그린다. 메인앱 전용. */
  function collectPane() {
    var errs = S.collectErrors || [];
    if (errs.length) {
      return '<div class="cardbox" style="padding:22px">'
        + '<div class="warn" style="margin-bottom:12px">⚠ 취합할 수 없습니다.</div>'
        + '<div style="max-height:220px;overflow:auto;font-size:14px;color:#78716c;line-height:1.9">'
        + errs.map(function (e) { return "· " + esc(e); }).join("<br/>") + "</div>"
        + '<div style="margin-top:16px"><button class="secondary" data-act="collectcancel">다시 시도</button></div></div>';
    }
    var p = S.collectPreview;
    if (!p) {
      return '<div class="cardbox" style="padding:22px">'
        + '<div style="font-size:15px;font-weight:800;color:#0f766e;margin-bottom:4px">여러 제출을 한 번에 취합</div>'
        + '<div style="font-size:14px;color:#78716c;line-height:1.6;margin-bottom:16px">개인 배포판이 내보낸 <b>프로세스_이름_부서_날짜.json</b> 들을 모아, 같은 업무는 한 노드로 합치고 <b>제출 인원수</b>를 셉니다. 업무 데이터에는 소속만 들어갑니다(이름 미저장).</div>'
        + (identReady() ? "" : '<div class="warn" style="margin-bottom:14px">⚠ 먼저 상단에 <b>부서</b>와 <b>작성자</b>를 지정하세요. 지정 전에는 취합이 되지 않습니다.</div>')
        + '<div class="fl">폴더 경로 스캔 <span style="color:#a8a29e;font-weight:600">· 관리자 PC 기준 경로</span></div>'
        + '<div style="display:flex;gap:8px;margin-top:4px"><input class="fi" style="flex:1;font-size:14.5px" data-fkey="collectfolder" value="' + esc(S.collectFolder || "") + '" placeholder="예: C:\\제출취합\\2026-07" />'
        + '<button class="primary" style="flex:none;padding:9px 18px" data-act="collectscan">스캔</button></div>'
        + '<div style="text-align:center;color:#a8a29e;font-size:13px;margin:14px 0 10px">— 또는 —</div>'
        + '<label class="drop" for="collectup" style="padding:20px"><div style="font-size:22px">⬆</div><div style="font-size:14.5px;font-weight:700;color:#57534e;margin-top:5px">제출 .json 여러 개 선택 (다중 업로드)</div></label>'
        + '<input id="collectup" type="file" accept=".json" multiple style="display:none" data-fkey="collectfiles" />'
        + '</div>';
    }
    // ── 미리보기 (파일별 상태표 + 병합 요약 + 제출 N명 상위) ──
    var files = p.files || [];
    var okFiles = files.filter(function (f) { return !f.errors; });
    var rowsHtml = files.map(function (f) {
      var bad = !!f.errors;
      return '<div style="display:grid;grid-template-columns:1fr auto auto auto;gap:8px;padding:7px 12px;border-bottom:1px solid #f7f4ee;font-size:13.5px;align-items:center'
        + (bad ? ';background:#fef2f2' : '') + '">'
        + '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(f.filename) + '">' + esc(f.filename) + "</span>"
        + '<span style="color:#57534e">' + esc(f.dept || "—") + "</span>"
        + '<span style="color:#a8a29e">노드 ' + esc(f.nodes) + "</span>"
        + (bad ? '<span style="color:#b91c1c">' + esc(f.errors) + "</span>" : '<span style="color:#166534">신규 ' + esc(f.new) + "</span>")
        + "</div>";
    }).join("");
    var topHtml = (p.top_submits || []).map(function (t) {
      return '<div style="display:flex;justify-content:space-between;padding:6px 12px;border-bottom:1px solid #f7f4ee;font-size:14px"><span>' + esc(t.path) + '</span><b style="color:#9d174b">👥 ' + esc(t.count) + "명</b></div>";
    }).join("");
    var cells = [["추가", p.added, "#166534", "#dcfce7"], ["변경", p.changed, "#92400e", "#fef3c7"]]
      .map(function (d) { return '<div class="diff" style="background:' + d[3] + '"><div class="dv" style="color:' + d[2] + '">' + esc(d[1]) + '</div><div class="dl" style="color:' + d[2] + '">' + d[0] + "</div></div>"; }).join("");
    return '<div class="cardbox" style="padding:22px">'
      + '<div style="font-size:15px;font-weight:800;color:#0f766e;margin-bottom:10px">반영 전 확인 — 제출 ' + okFiles.length + '건 취합</div>'
      + '<div style="font-size:14px;font-weight:800;color:#57534e;margin-bottom:6px">파일별 상태</div>'
      + '<div class="cardbox" style="max-height:200px;overflow:auto;margin-bottom:14px">' + (rowsHtml || '<div style="padding:10px;color:#a8a29e">파일 없음</div>') + "</div>"
      + '<div class="diffgrid" style="grid-template-columns:1fr 1fr">' + cells + "</div>"
      + (topHtml ? '<div style="font-size:14px;font-weight:800;color:#9d174b;margin:14px 0 6px">👥 여러 명이 하는 업무 (제출 인원 순)</div><div class="cardbox" style="max-height:200px;overflow:auto">' + topHtml + "</div>" : '<div style="font-size:13.5px;color:#a8a29e;margin-top:12px">2명 이상이 겹쳐 제출한 업무가 없습니다.</div>')
      + '<div style="display:flex;gap:8px;margin-top:20px"><button class="secondary" data-act="collectcancel">취소</button>'
      + '<button class="primary" data-act="collectapply">이 내용으로 취합 반영</button></div>'
      + '<div style="font-size:13.5px;color:#a8a29e;margin-top:10px">반영 후 상단 [저장] 을 눌러야 파일에 기록됩니다. 업무 데이터에 이름은 저장되지 않습니다.</div></div>';
  }

  /** 개인 모드 IO — 서버가 없으니 제출 파일 내보내기 / 이어서 작성하기만 있다. */
  function pageSoloIO() {
    var st = stats();
    var ready = !!S.dept && !!S.author;   // 소속·이름 필수 (이름은 파일명 구분자)
    return '<div class="page scroll"><div class="pw"><div class="h1">내보내기 / 불러오기</div>'
      + '<div class="sub">작성이 끝나면 파일로 내보내 관리자에게 전달하세요. 편집 내용은 이 브라우저에 자동 저장됩니다.</div>'
      + '<div class="cardbox" style="padding:22px;margin-top:18px">'
      + '<div style="font-size:15px;font-weight:800;color:#0f766e;margin-bottom:10px">⬇ 제출 파일 내보내기</div>'
      + (ready
          ? '<div style="font-size:14.5px;color:#78716c;line-height:1.6">소속 <b>' + esc(S.dept) + '</b> · 이름 <b>' + esc(S.author)
            + '</b> 으로 내보냅니다. 세부업무 ' + st.detail + "개"
            + (st.hoursMissing ? ' <span style="color:#92400e">(미완성 ' + st.hoursMissing + "개)</span>" : "")
            + '<br/><span style="color:#a8a29e">파일명: <b>' + esc(soloExportName()) + "</b></span></div>"
          : '<div class="warn">상단에 <b>소속</b>과 <b>이름</b>을 먼저 입력하세요. 이름은 파일명 구분자라 <b>필수</b>입니다. 취합은 소속별로 집계합니다.</div>')
      + '<div style="margin-top:14px"><button class="' + (ready ? "primary" : "secondary") + '" data-act="save">⬇ 제출 파일 내보내기 (.json)</button></div>'
      + '<div class="solohint">· 카드마다 부서를 적지 않아도 됩니다 — 내보낼 때 위 소속이 자동으로 들어갑니다.<br/>'
      + '· <b>업무 데이터</b>에는 소속만 들어가고 이름은 없습니다(소속별 집계). 이름은 <b>파일명·제출자 식별</b>에만 씁니다.</div></div>'
      + '<div class="cardbox" style="padding:22px;margin-top:14px">'
      + '<div style="font-size:15px;font-weight:800;color:#57534e;margin-bottom:10px">⬆ 이어서 작성하기</div>'
      + '<div style="font-size:14.5px;color:#78716c;line-height:1.6">전에 내보낸 .json 을 불러오면 그 시점부터 이어서 쓸 수 있습니다. PC 를 바꿨거나 브라우저를 초기화했을 때 쓰세요.</div>'
      + '<label class="drop" for="jsonup" style="margin-top:12px;padding:22px"><div style="font-size:22px">⬆</div>'
      + '<div style="font-size:14.5px;font-weight:700;color:#57534e;margin-top:5px">내보낸 .json 파일 선택</div></label>'
      + '<input id="jsonup" type="file" accept=".json" style="display:none" data-fkey="jsonup" />'
      + '<div class="warn" style="margin-top:12px">⚠ 불러오면 지금 화면의 내용이 파일 내용으로 <b>바뀝니다</b>.</div></div>'
      // 엑셀에서 계층(lv3~lv5)을 복사해 붙여넣기 — 카드 하나씩 만들지 않고 뼈대를 한 번에
      + '<div class="cardbox" style="padding:22px;margin-top:14px">'
      + '<div style="font-size:15px;font-weight:800;color:#57534e;margin-bottom:10px">📋 엑셀에서 계층 붙여넣기 <span style="font-weight:600;color:#a8a29e">· lv3~lv5</span></div>'
      + '<div style="font-size:14.5px;color:#78716c;line-height:1.6">엑셀에서 <b>세 열(부문 · 대분류 · 중분류)</b>을 선택해 복사(Ctrl+C)한 뒤 아래에 붙여넣고(Ctrl+V) 반영하세요. 이미 있는 항목은 재사용되어 <b>중복되지 않습니다</b>. 세부업무(lv6)와 발생 패턴은 붙여넣은 뒤 계층 편집에서 채웁니다.</div>'
      + (ready ? "" : '<div class="warn" style="margin-top:12px">⚠ 먼저 상단에 <b>소속</b>과 <b>이름</b>을 지정하세요. 지정 전에는 붙여넣기 반영이 되지 않습니다.</div>')
      + '<textarea id="skelpaste" class="fa" style="min-height:120px;margin-top:12px;font-family:ui-monospace,Consolas,monospace;font-size:14px;white-space:pre" placeholder="선장운전	항해장비	레이더\n선장운전	항해장비	자이로\n전장운전	전력계통	발전기"></textarea>'
      + '<div style="margin-top:10px"><button class="primary" data-act="skelapply">📋 붙여넣기 반영</button></div>'
      + '<div class="solohint">· 왼쪽부터 연속으로 채우세요 — 대분류를 비우고 중분류만 있으면 그 줄은 건너뜁니다.<br/>'
      + '· 첫 줄이 머리글(부문/대분류/중분류)이면 자동으로 건너뜁니다.</div></div>'
      + "</div></div>";
  }

  // 개인 배포판 사용법 — 처음 여는 사람이 이 탭만 보고 작성할 수 있게 한다.
  function pageManual() {
    function step(no, title, bodyHtml) {
      return '<div class="cardbox" style="padding:20px;margin-top:14px">'
        + '<div style="display:flex;align-items:baseline;gap:9px;margin-bottom:8px">'
        + '<span style="flex:none;width:22px;height:22px;line-height:22px;text-align:center;border-radius:50%;background:#0f766e;color:#fff;font-size:14px;font-weight:800">' + no + "</span>"
        + '<span style="font-size:16px;font-weight:800;color:#292524">' + title + "</span></div>"
        + '<div style="font-size:14.8px;color:#57534e;line-height:1.75">' + bodyHtml + "</div></div>";
    }
    var patTbl = '<table style="width:100%;border-collapse:collapse;margin-top:8px;font-size:14.3px">'
      + '<tr style="background:#faf8f3;color:#78716c;font-weight:800"><td style="padding:7px 9px;border:1px solid #eee">발생 패턴</td><td style="padding:7px 9px;border:1px solid #eee">언제</td><td style="padding:7px 9px;border:1px solid #eee">무엇을 입력</td></tr>'
      + '<tr><td style="padding:7px 9px;border:1px solid #eee"><b>상시루틴</b></td><td style="padding:7px 9px;border:1px solid #eee">호선과 무관하게 늘</td><td style="padding:7px 9px;border:1px solid #eee">기간 단위 + 횟수 (예: 주 3회)</td></tr>'
      + '<tr><td style="padding:7px 9px;border:1px solid #eee"><b>호선루틴</b></td><td style="padding:7px 9px;border:1px solid #eee">호선 도는 동안 반복</td><td style="padding:7px 9px;border:1px solid #eee">기간 단위 + 횟수 + <b>반복 구간</b>(복수)</td></tr>'
      + '<tr><td style="padding:7px 9px;border:1px solid #eee"><b>호선이벤트</b></td><td style="padding:7px 9px;border:1px solid #eee">특정 시점에만</td><td style="padding:7px 9px;border:1px solid #eee"><b>시점</b>(마일스톤 ±일)을 여러 개 → 줄 수 = 호선당 횟수</td></tr>'
      + "</table>";
    return '<div class="page scroll"><div class="pw"><div class="h1">📖 사용법</div>'
      + '<div class="sub">내 업무를 프로세스 계층으로 적어 관리자에게 제출하는 <b>개인 작성용</b> 화면입니다. 입력은 이 브라우저에 <b>자동 저장</b>되고, 마지막에 파일 한 개로 내보냅니다. (저장 버튼은 따로 없습니다.)</div>'
      + step(1, "소속·이름을 입력합니다", '상단 <b>소속</b>과 <b>이름</b>을 입력하세요(둘 다 필수). 이름은 <b>파일명 구분자</b>라 필수지만, <b>업무 데이터에는 소속만</b> 들어가고 취합은 소속별로 합니다(이름은 파일명·제출자 식별에만).')
      + step(2, "업무 계층을 만듭니다", '<b>계층 편집</b> 탭에서 <b>부문(lv3) › 대분류(lv4) › 중분류(lv5) › 세부업무(lv6)</b> 순으로 각 컬럼의 <b>＋</b> 를 눌러 추가합니다. 카드를 드래그해 순서를 바꾸거나 상위를 바꿀 수 있습니다.<br/>업무가 많으면 <b>내보내기/불러오기</b> 탭의 <b>📋 엑셀에서 계층 붙여넣기</b>로 부문·대분류·중분류를 한 번에 만드세요.')
      + step(3, "세부업무(lv6)에 내용을 채웁니다", '세부업무 카드를 클릭하면 오른쪽에서 편집합니다. <b>AI 에이전트 적용 여부</b>, <b>자동화 수준</b>, <b>1회 소요시간</b>, 그리고 <b>발생 패턴</b>을 고릅니다.' + patTbl
        + '<div style="margin-top:8px">· <b>선종</b>은 대분류(lv4)에서 지정하면 그 아래 세부업무가 물려받습니다 — 업무마다 다시 고르지 않아도 됩니다.<br/>· 채운 요약(발생패턴·부하·자동화·선종)은 <b>왼쪽 카드 배지</b>로 바로 보여, 보드에서 한눈에 확인됩니다.</div>')
      + step(4, "제출 파일을 내보냅니다", '<b>내보내기/불러오기</b> 탭에서 <b>⬇ 제출 파일 내보내기(.json)</b> 를 눌러 파일을 받고 관리자에게 전달합니다. 파일명은 <b>프로세스_이름_소속_날짜.json</b> (예: <code style="background:#f0ede6;padding:1px 5px;border-radius:4px">프로세스_홍길동_시운전1부_20260720.json</code>) — 관리자가 여러 제출을 취합할 때 사람을 구분합니다. 업무 데이터에는 소속만 들어갑니다.')
      + step(5, "이어서 작성 / PC 변경", '내보낸 <b>.json</b> 을 <b>내보내기/불러오기</b> 탭에서 다시 불러오면 그 시점부터 이어서 씁니다. PC 를 바꾸거나 브라우저를 초기화했을 때 사용하세요.')
      + '<div class="solohint" style="margin-top:16px">궁금한 점은 관리자에게 문의하세요. 입력값은 부하 분석(건조 계획 × 업무 → 일 단위 부하, AI 도입 효과)에 쓰입니다.</div>'
      + "</div></div>";
  }

  function pageExcel() {
    if (SOLO) return pageSoloIO();
    var st = stats();
    var subLabel = { up: "⬆ 가져오기 (일괄등록)", collect: "🧩 제출 취합", down: "⬇ 내보내기" };
    var sub = ["up", "collect", "down"].map(function (k) { return '<button class="stab' + (S.excelTab === k ? " on" : "") + '" data-act="exceltab" data-k="' + k + '">' + subLabel[k] + "</button>"; }).join("");
    var pane = "";
    if (S.excelTab === "up") {
      pane = importPane();
    } else if (S.excelTab === "collect") {
      pane = collectPane();
    } else {

  // 되돌릴 수 없는 조작 앞의 확인 모달 (삭제 / 디스크 다시 읽기)
  function confirmModal() {
    var c = S.confirm; if (!c) return "";

      + '<button class="' + (c.danger ? "mdanger" : "primary") + '" data-act="cxok">' + esc(c.okLabel || "확인") + "</button></div>"

  // ── 렌더 / 포커스 복원 ──────────────────────────────
  function fullView() {
    var body;
    if (S.activeTab === "domain") body = pageDomain();
    else if (S.activeTab === "io") body = pageExcel();
    else if (S.activeTab === "manual" && SOLO) body = pageManual();
    else if (S.activeTab === "hist" && !SOLO) body = pageHistory();
    else body = '<div class="treewrap">' + crumbBar() + '<div class="body">' + (S.viewMode === "outline" ? outline() : columns()) + panel() + "</div></div>";
    return topbar() + banners() + body + confirmModal();
  }
  function rerender(focusSel) {
    // 다시 그리기 전에 캐럿 위치를 기억한다. 무조건 끝으로 보내면 글자 중간을 고칠 때
    // 한 자 칠 때마다 커서가 맨 뒤로 튄다.
    var caret = null;
    if (focusSel) {
      var prev = contentEl.querySelector(focusSel);
      if (prev && prev === document.activeElement) {
        try { caret = { s: prev.selectionStart, e: prev.selectionEnd }; } catch (e) {}
      }
    }
    contentEl.innerHTML = fullView();
    wireDnD();          // innerHTML 로 DOM 을 갈아끼웠으므로 Sortable 을 다시 붙인다
    layout();
    if (focusSel) {
      var el = contentEl.querySelector(focusSel);
      if (el) {
        el.focus();
        try {
          if (caret) el.setSelectionRange(caret.s, caret.e);
          else el.setSelectionRange(el.value.length, el.value.length);
        } catch (e) {}
      }
    }
  }
  function layout() {
    // iframe 높이 자동 — Streamlit 스크롤은 컴포넌트 안에서 처리한다
    var target = IN_ST ? 820 : (document.querySelector(".app") ? document.querySelector(".app").offsetHeight : 820);
    if (IN_ST) setHeight(824);
  }

  // ── 이벤트 위임 (한 번만 바인딩) ─────────────────────
  var _dragging = false;
  function onClick(e) {
    if (_dragging) return;          // 드래그 끝에 딸려오는 click 이 select 로 새지 않게
    // 입력칸(카드 이름 등)을 클릭하면 select 로 새지 않게 — 카드가 통째로 data-act="select" 라
    // 그냥 두면 rerender 로 input 이 파괴돼 편집을 시작할 수 없다. 포커스는 브라우저가 알아서 준다.
    if (e.target.closest("[data-fkey]")) return;
    var el = e.target.closest("[data-act]"); if (!el) return;
    var a = el.dataset.act, d = el.dataset;
    if (a === "tab") {
      S.activeTab = d.k; rerender();
      // 이력 탭 진입 시 기본 선택의 diff 를 파이썬에 요청 (안 하면 "계산하는 중…" 에 머문다)
      if (S.activeTab === "hist" && S.history.length && !S.diffPreview) actHistPick(S.histPick || 0);
    }
    else if (a === "viewcols") S.viewMode = "columns", rerender();
    else if (a === "viewout") S.viewMode = "outline", rerender();
    else if (a === "select") actSelect(d.id);
    else if (a === "add") actAdd(d.pid, +d.lv);
    else if (a === "toggle") actToggle(d.id);
    else if (a === "collapse") actCollapseAll();
    else if (a === "del") actDel(d.id);
    else if (a === "tech") actToggleTech(d.id, d.t);
    else if (a === "mchip") actToggleMulti(d.id, d.k, d.v);      // 선종·구간 복수 선택
    else if (a === "freqchip") actSetFreqUnit(d.id, d.v);        // 기간 단위 택1
    else if (a === "occur") actSetOccur(d.id, d.v);
    else if (a === "evadd") actEvAdd(d.id);                      // 호선이벤트 시점 추가
    else if (a === "evdel") actEvDel(d.id, +d.idx);
    else if (a === "skelapply") actPasteSkeleton();             // lv3~lv5 붙여넣기 반영
    else if (a === "save") doSave();
    else if (a === "domtab") S.domTab = d.k, rerender();
    else if (a === "domadd") domAdd(d.k);
    else if (a === "domdel") domDelete(d.k, +d.i);
    else if (a === "exceltab") S.excelTab = d.k, rerender();
    else if (a === "down") emit({ type: "download", fmt: d.fmt, mask: S.mask, nodes: S.nodes, domains: S.domains });
    else if (a === "histpick") actHistPick(+d.i);
    else if (a === "restore") { if (!S.author) return flash("작성자를 먼저 입력하세요"); if (!S.restoreOk) return; emit({ type: "restore", file: (S.history[S.histPick] || {}).file, author: S.author }); }
    else if (a === "reload") actReload();
    else if (a === "force") emit({ type: "force", rev: S.rev, author: S.author, nodes: S.nodes, domains: S.domains });
    else if (a === "dismiss") { S.conflict = null; rerender(); }
    else if (a === "impapply") emit({ type: "import_apply", delete_missing: S.delMissing, add_domains: S.addDomains });
    else if (a === "impcancel") { S.importPreview = null; S.importErrors = []; S.delMissing = false; rerender(); emit({ type: "import_cancel" }); }
    else if (a === "collectscan") { if (!needIdent()) return; emit({ type: "collect_scan", folder: S.collectFolder || "" }); flash("폴더를 스캔하는 중…"); }
    else if (a === "collectapply") emit({ type: "collect_apply" });
    else if (a === "collectcancel") { S.collectPreview = null; S.collectErrors = []; rerender(); emit({ type: "collect_cancel" }); }
    else if (a === "cxcancel") { S.confirm = null; rerender(); }
    else if (a === "cxok") { var c = S.confirm; S.confirm = null; if (c && c.onOk) c.onOk(); else rerender(); }
  }
  // ★ 한글 IME: 조합 중(ㅎ+ㅏ→하)에 rerender 로 입력칸을 새 DOM 으로 갈아끼우면 조합이
  //   끊겨 자모가 낱낱이 확정된다("ㅎㅏㅎㅏ"). 조합 중에는 모델만 갱신하고 화면은 그대로 둔다.
  //   compositionend 에서 한 번만 다시 그린다. (일본어·중국어 IME 도 동일)
  var _composing = false;
  function onCompositionStart() { _composing = true; }
  function onCompositionEnd(e) {
    _composing = false;
    var el = e.target && e.target.closest && e.target.closest("[data-fkey]");
    if (el) applyInput(el, true);      // 조합 완료 — 이제 안전하게 갱신
  }

  // ★ 이름·설명은 카드/전체보기/헤더에 실시간으로 비치는 자유 텍스트다. 예전엔 한 글자 칠 때마다
  //   rerender() 로 contentEl.innerHTML 을 통째로 갈아끼우고 wireDnD() 로 Sortable 을 다시 붙였다.
  //   그 사이 포커스된 <input> 이 파괴돼, 빠르게 치면 그 순간의 글자가 **사라진다**("한번씩").
  //   해법: 모델만 갱신하고 화면의 '메아리'(카드 이름·설명)만 제자리에서 고친다. input 은 손대지
  //   않으므로 캐럿·조합이 끊기지 않는다. 칸을 벗어날 때(onChange) 한 번만 전체를 다시 그려 동기화한다.
  function echoName(id) {
    var n = byId(id); if (!n) return;
    var t = n.name || "";
    // 이름은 카드·전체보기 행·상세 패널 어디서나 편집할 수 있다. 같은 노드의 다른 이름 입력칸들도
    // 실시간으로 맞춰준다 — 단, 지금 타이핑 중인 칸(activeElement)은 캐럿이 튀지 않게 건드리지 않는다.
    contentEl.querySelectorAll('input[data-fkey="name"][data-id="' + id + '"]').forEach(function (inp) {
      if (inp !== document.activeElement) inp.value = t;
    });
    var p = contentEl.querySelector(".pname"); if (p) p.textContent = t || "(이름 없음)";
    // 부문(lv3)은 카드가 없다 — 빵부스러기 드롭다운 옵션을 바로 갱신해 이름 편집이 즉시 보이게 한다
    var op = contentEl.querySelector('[data-fkey="crumblv3"] option[value="' + id + '"]'); if (op) op.textContent = t || "(이름 없음)";
  }
  function echoDesc(id) {
    var n = byId(id); if (!n) return;
    var c = contentEl.querySelector('.card[data-id="' + id + '"] .cdesc'); if (c) c.textContent = n.desc || "";
    var r = contentEl.querySelector('.rowmain[data-id="' + id + '"] .rowdesc'); if (r) r.textContent = n.desc || "";
  }

  function applyInput(el, doRender) {
    var f = el.dataset.fkey, id = el.dataset.id;
    if (f === "author") {
      S.author = el.value;
      var sv = contentEl.querySelector(".save");
      if (sv) { var can = SOLO ? (!!S.dept && !!S.author) : (!!S.author && S.dirty.length > 0); sv.className = "save " + (can ? "on" : "off"); }
      soloSaveSoon();
      return;
    }
    if (f === "collectfolder") { S.collectFolder = el.value; return; }   // 폴더 경로 — 모델만, 스캔 클릭 때 사용
    // ★ 모든 자유 텍스트/숫자 입력은 **모델만 갱신하고 rerender 하지 않는다**. 키 입력마다
    //   rerender 하면 contentEl.innerHTML 이 통째로 갈려 포커스된 input 이 파괴돼 글자가 사라진다.
    //   칸을 벗어날 때(onChange)에 한 번만 전체를 다시 그려 배지·힌트를 동기화한다. (name·desc 는
    //   카드에 실시간 반영돼야 해서 메아리까지.) 숫자를 parseFloat 로 스냅하지 않는 것도 유지
    //   ("0." 이 "0" 이 되면 소수점을 못 친다) — 친 문자열 그대로 저장, 정리는 파이썬 normalize.
    if (f === "name") { var nn = byId(id); if (nn) { nn.name = el.value; markDirty(id); echoName(id); } return; }
    if (f === "desc") { var nd = byId(id); if (nd) { nd.desc = el.value; markDirty(id); echoDesc(id); } return; }
    // 호선이벤트 시점 오프셋 — 인덱스별 (events[idx]). 모델만.
    if (f === "ev_offset_start" || f === "ev_offset_days") {
      var ei = +el.dataset.idx, ek = f === "ev_offset_start" ? "offset_start" : "offset_days";
      var ne = byId(id); if (ne && ne.events && ne.events[ei]) { ne.events[ei][ek] = el.value; markDirty(id); }
      return;
    }
    var FIELDS = { owner: 1, outputs: 1, linked_system_detail: 1, work_hours: 1, annual_count: 1, freq_count: 1 };
    if (FIELDS[f]) { var nf = byId(id); if (nf) { nf[f] = el.value; markDirty(id); } return; }
    // 도메인 값(dom)은 여기가 아니라 onChange(블러)에서 한 번만 커밋 — 글자마다 커밋하면 미완성 값이 박힌다.
    // 검색은 디바운스 rerender — 타이핑을 멈춘 뒤에만 다시 그려 input 파괴(글자 유실)를 피하고 라이브도 유지.
    if (f === "query") {
      S.query = el.value;
      clearTimeout(_queryTimer);
      _queryTimer = setTimeout(function () { rerender('[data-fkey="query"]'); }, 200);
      return;
    }
  }
  var _queryTimer = null;

  function onInput(e) {
    var el = e.target.closest("[data-fkey]"); if (!el) return;
    applyInput(el, !(_composing || e.isComposing));
  }
  // Enter 로 확정하는 입력 (목록에 없는 기술 추가)
  function onKeydown(e) {
    if (e.key !== "Enter") return;
    // 한글 조합을 Enter 로 확정하는 순간에도 keydown 이 온다 — 그걸 "추가" 로 오인하면
    // "레이더" 를 치다 Enter 를 눌렀을 뿐인데 미완성 기술이 등록된다.
    if (_composing || e.isComposing || e.keyCode === 229) return;
    var el = e.target.closest('[data-fkey="newtech"]'); if (!el) return;
    e.preventDefault();
    actAddTech(el.dataset.id, el.value);
  }
  // 타이핑 중엔 모델만 갱신하고, 블러(change) 때 rerender 로 동기화하는 자유 텍스트/숫자 필드들.
  var BLUR_SYNC = { name: 1, desc: 1, owner: 1, outputs: 1, linked_system_detail: 1,
                    work_hours: 1, annual_count: 1, freq_count: 1, ev_offset_start: 1, ev_offset_days: 1 };
  // change = 값이 확정된 시점(칸을 벗어나거나 Enter). select/checkbox 와 도메인 값 입력이 여기 온다.
  function onChange(e) {
    var el = e.target.closest("[data-fkey]"); if (!el) return;
    if (el.dataset.fkey === "dom") {
      return domRename(el.dataset.k, +el.dataset.i, el.value,
                       '[data-fkey="dom"][data-i="' + el.dataset.i + '"]');
    }
    var f = el.dataset.fkey;
    // 자유 텍스트/숫자 입력은 타이핑 중엔 모델만 갱신했으니, 칸을 벗어난 지금 전체를 한 번 동기화한다
    // (카드 배지·부하 힌트·미저장 점·빵부스러기 등). 값은 이미 모델에 들어가 있다.
    if (BLUR_SYNC[f]) { rerender(); return; }
    if (f === "ai") return actUpdate(el.dataset.id, "has_ai_agent", el.checked);
    if (f === "mydept") { S.dept = el.value; soloSave(); rerender(); return; }
    if (f === "ev_event") return actEvSet(el.dataset.id, +el.dataset.idx, "event", el.value);
    if (f === "dept" || f === "automation_level" || f === "linked_system")
      return actUpdate(el.dataset.id, f, el.value);
    if (f === "crumblv3") { if (el.value) actSelect(el.value); return; }   // 빵부스러기 부문 드롭다운
    if (f === "moveto") return actMoveTo(el.dataset.id, el.value);
    if (f === "query") { clearTimeout(_queryTimer); S.query = el.value; rerender('[data-fkey="query"]'); return; }
    if (f === "mask") { S.mask = el.checked; rerender(); return; }
    if (f === "restoreok") { S.restoreOk = el.checked; rerender(); return; }
    if (f === "delmissing") { S.delMissing = el.checked; return; }
    if (f === "adddomains") { S.addDomains = el.checked; return; }
    if (f === "xlsxfile") {
      if (!needIdent()) { el.value = ""; return; }        // 부서·이름 먼저
      var file = el.files && el.files[0]; if (!file) return;
      var rd = new FileReader();
      // 파싱/미리보기 요청일 뿐 — 반영은 사용자가 [이 내용으로 반영] 을 눌러야 일어난다
      rd.onload = function () { var b64 = String(rd.result).split(",")[1] || ""; emit({ type: "import", filename: file.name, b64: b64 }); flash("파일을 읽는 중…"); };
      rd.readAsDataURL(file);
    }
    if (f === "jsonup") {            // 개인 모드 — 이어서 작성하기
      var jf = el.files && el.files[0]; if (!jf) return;
      var jr = new FileReader();
      jr.onload = function () { emit({ type: "import_local", text: String(jr.result) }); };
      jr.readAsText(jf, "utf-8");
    }
    if (f === "collectfiles") {       // 취합 — 여러 .json 을 한 번에 읽어 배열로 보낸다
      if (!needIdent()) { el.value = ""; return; }        // 부서·이름 먼저
      var fl = el.files ? [].slice.call(el.files) : []; if (!fl.length) return;
      var out = [], done = 0;
      flash(fl.length + "개 파일을 읽는 중…");
      fl.forEach(function (file, i) {
        var rd = new FileReader();
        rd.onload = function () {
          out[i] = { name: file.name, b64: String(rd.result).split(",")[1] || "" };
          if (++done === fl.length) emit({ type: "collect_scan", files: out });
        };
        rd.readAsDataURL(file);
      });
    }
  }

  // ── 초기화 / Streamlit 렌더 수신 ────────────────────
  function applyArgs(args) {
    // ★ 트리는 epoch 이 바뀔 때만 갈아끼운다. 매 렌더마다 덮으면 download·histpick 같은
    //   조회성 왕복에도 화면이 저장본으로 되돌아가 미저장 편집이 조용히 사라진다.
    var ep = args.tree_epoch;
    if (args.tree && (S.treeEpoch === null || ep !== S.treeEpoch)) {
      S.treeEpoch = ep;
      S.nodes = (args.tree.nodes || []).map(function (n) { return Object.assign({}, n); });
      S.domains = JSON.parse(JSON.stringify(args.tree.domains || DEF_DOMAINS));
      S.rev = args.tree.rev || 0;
      S.dirty = [];             // 파이썬이 준 새 정본 = 미저장 변경 없음
      if (args.dirty_all) S.dirty = S.nodes.map(function (n) { return n.id; }).concat(["dom"]);  // 엑셀 반영 직후: 전부 미저장
      // 새 트리에 없는 노드를 가리키던 선택은 버린다 (복원·엑셀 반영 후)
      if (S.selectedId && !byId(S.selectedId)) { S.selectedId = null; S.sel = {}; }
      else if (S.selectedId) selectPath(S.selectedId);
    } else if (args.tree) {
      S.rev = args.tree.rev || 0;   // 저장 충돌 판정용 rev 는 항상 최신으로
    }
    if (typeof args.author === "string" && args.author) S.author = args.author;
    S.env = args.env || "";
    S.history = args.history || [];
    S.audit = args.audit || [];
    S.conflict = args.conflict || null;
    S.diskNewer = args.disk_newer || null;
    S.diffPreview = args.diff_preview || null;
    S.importPreview = args.import_preview || null;
    S.importErrors = args.import_errors || [];
    S.collectPreview = args.collect_preview || null;
    S.collectErrors = args.collect_errors || [];
    if (!S.importPreview) S.delMissing = false;   // 다음 업로드에 삭제 옵션이 딸려가지 않게
    if (typeof args.flash === "string" && args.flash) flash(args.flash);
    if (S.histPick >= (S.history.length || 1)) S.histPick = 0;
  }
  function boot() {
    appEl = document.getElementById("app");
    appEl.className = "app";
    contentEl = document.createElement("div");
    contentEl.style.display = "flex";
    contentEl.style.flexDirection = "column";
    // Streamlit iframe 안에선 setFrameHeight 로 820 고정. 단독 배포판은 뷰포트 전체를 채운다
    // (안 그러면 큰 모니터에서 하단에 빈 여백이 크게 남는다).
    if (!IN_ST) document.documentElement.classList.add("solo");
    contentEl.style.height = IN_ST ? "820px" : "100vh";
    appEl.appendChild(contentEl);
    appEl.addEventListener("click", onClick);
    appEl.addEventListener("input", onInput);
    appEl.addEventListener("change", onChange);
    appEl.addEventListener("keydown", onKeydown);
    // 한글 IME — 조합 중엔 rerender 를 멈춰야 자모가 낱낱이 확정되지 않는다
    appEl.addEventListener("compositionstart", onCompositionStart);
    appEl.addEventListener("compositionend", onCompositionEnd);
    rerender();
  }

  window.addEventListener("message", function (e) {
    if (!e.data || e.data.type !== "streamlit:render") return;
    IN_ST = true;
    try { applyArgs(e.data.args || {}); if (!appEl) boot(); else rerender(); }
    catch (err) { if (appEl) contentEl.innerHTML = '<div style="padding:20px;color:#b91c1c">화면 오류: ' + esc(err && err.message) + "</div>"; }
  });

  if (SOLO) {
    // 개인 배포판: 파이썬을 기다릴 이유가 없다. localStorage 초안이 있으면 이어서, 없으면 시드로.
    var saved = soloLoad();
    // build_standalone.py 가 과별 기본 골격을 주입할 수 있다(window.__PD_SEED__). 초안이 있으면
    // 시드는 무시하고 이어서 — 이미 작성 중인 사람의 작업분을 골격이 덮지 않게 한다.
    var seedDept = "";
    if (saved) {
      S.nodes = saved.nodes.map(coerceEvents); S.domains = saved.domains || JSON.parse(JSON.stringify(DEF_DOMAINS));
      S.dept = saved.dept || ""; S.author = saved.author || ""; S.exported = true;
    } else if (window.__PD_SEED__ && Array.isArray(window.__PD_SEED__.nodes) && window.__PD_SEED__.nodes.length) {
      var sd = window.__PD_SEED__;
      S.nodes = sd.nodes.map(function (n) { return coerceEvents(Object.assign({}, n)); });
      S.domains = sd.domains ? JSON.parse(JSON.stringify(sd.domains)) : JSON.parse(JSON.stringify(DEF_DOMAINS));
      S.dept = sd.dept || sd.exported_dept || "";   // 과 자동 지정(있으면)
      seedDept = S.dept;
    } else {
      S.nodes = soloSeed(); S.domains = JSON.parse(JSON.stringify(DEF_DOMAINS));
    }
    boot();
    if (saved) flash("이 브라우저에 저장해둔 작성분을 불러왔습니다");
    else if (seedDept) flash(seedDept + " 기본 골격으로 시작합니다 — 세부업무(lv6)를 채워 제출하세요");
  } else {
    // 디자인 단독 미리보기: 300ms 안에 Streamlit render 가 안 오면 목업으로 뜬다
    setTimeout(function () { if (!IN_ST) { S.nodes = seed(); S.domains = JSON.parse(JSON.stringify(DEF_DOMAINS)); S.history = MOCK_HIST; S.audit = MOCK_AUDIT; boot(); } }, 300);
    send({ type: "streamlit:componentReady", apiVersion: 1 });
  }
})();
</script>
</body>
</html>
